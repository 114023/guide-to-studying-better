<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rogue Roulette</title>
    <style>
        :root {
            --bg-dark: #121212;
            --panel-bg: rgba(30, 30, 30, 0.9);
            --accent-yellow: #ffcc00;
            --live-red: #ff4444;
            --blank-blue: #44aaff;
            --fire-orange: #ff8800;
            --heal-green: #44ff44;
            --text-dim: #bbbbbb;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            color: #eee;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            user-select: none;
        }

        /* Brick Wall Background */
        #game-container {
            position: relative;
            width: 100vw; height: 100vh;
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                              url('https://static.vecteezy.com/system/resources/thumbnails/007/995/476/small/brick-wall-background-seamless-texture-pattern-illustration-free-vector.jpg');
            background-repeat: repeat;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
        }

        /* Lighting & Shadow Layer */
        #lighting-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 5;
        }

        /* UI Elements */
        #header { width: 100%; padding: 20px; text-align: center; z-index: 10; }
        #match-info { font-size: 1.5rem; color: var(--accent-yellow); text-shadow: 0 0 10px #000; }

        #arena {
            position: relative; width: 100%; flex-grow: 1;
            display: flex; justify-content: space-around; align-items: center;
            z-index: 10;
        }

        .player-card {
            width: 220px; padding: 20px;
            background: var(--panel-bg);
            border: 2px solid #333;
            border-radius: 8px;
            text-align: center;
            transition: all 0.3s ease;
            position: relative;
        }

        .player-card.active { border-color: var(--accent-yellow); box-shadow: 0 0 20px rgba(255, 204, 0, 0.3); }
        .player-card.inactive { opacity: 0.6; filter: grayscale(0.5); pointer-events: none; }

        .portrait {
            width: 120px; height: 120px; margin: 0 auto 15px;
            background: #222; border: 4px solid #444; border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            font-size: 4rem; cursor: crosshair; transition: transform 0.1s;
        }
        .portrait:hover { transform: scale(1.05); border-color: var(--live-red); }

        .name-tag { font-weight: bold; cursor: pointer; color: var(--accent-yellow); margin-bottom: 5px; }
        .stats { font-size: 0.9rem; color: var(--text-dim); }

        .inventory {
            display: flex; justify-content: center; gap: 5px; margin-top: 15px;
            min-height: 40px;
        }
        .inv-slot {
            width: 40px; height: 40px; background: rgba(0,0,0,0.5);
            border: 1px solid #444; border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 1.2rem;
        }

        /* Gun Styles */
        #gun-system {
            position: absolute; top: 50%; left: 50%;
            width: 100px; height: 60px;
            transform: translate(-50%, -50%);
            pointer-events: none; transition: transform 0.1s ease-out;
            font-size: 3rem; display: flex; align-items: center; justify-content: center;
        }

        /* Footer */
        #footer { width: 100%; padding: 20px; text-align: center; z-index: 10; }
        #ammo-display { font-size: 2rem; letter-spacing: 5px; }

        /* Toasts & Logs */
        #toast {
            position: absolute; top: 80px; left: 50%; transform: translateX(-50%);
            padding: 10px 20px; background: rgba(0,0,0,0.8); border: 1px solid var(--accent-yellow);
            border-radius: 20px; opacity: 0; transition: opacity 0.3s; z-index: 100;
        }

        #event-log {
            position: absolute; bottom: 20px; right: 20px; width: 250px; max-height: 150px;
            background: rgba(0,0,0,0.8); font-size: 0.7rem; padding: 10px;
            overflow-y: auto; display: none; z-index: 100; border: 1px solid #444;
        }

        /* Animations */
        @keyframes floatToInv {
            0% { transform: translateY(100px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        .item-get { animation: floatToInv 0.8s ease-out; }

        /* End Screen */
        #end-screen {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000;
        }
        .stat-grid { display: flex; gap: 40px; margin-top: 20px; text-align: left; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="lighting-overlay"></canvas>

    <div id="header">
        <div id="match-info">ROUND 1 / 5</div>
        <div style="color: #666; font-size: 0.8rem;">CHAMBER: <span id="chamber-count">6/6</span></div>
    </div>

    <div id="toast">Message here</div>

    <div id="arena">
        <div id="p0-card" class="player-card active">
            <div class="name-tag" onclick="renamePlayer(0)">PLAYER 1</div>
            <div id="p0-tier" style="font-size: 0.7rem; margin-bottom: 10px;">ROOKIE</div>
            <div class="portrait" onclick="handleShoot(0)">👤</div>
            <div class="stats">
                LIVES: <span id="p0-lives">❤❤❤</span><br>
                EXP: <span id="p0-exp">0</span>
            </div>
            <div class="inventory" id="p0-inv">
                <div class="inv-slot" onclick="useItem(0, 0)"></div>
                <div class="inv-slot" onclick="useItem(0, 1)"></div>
                <div class="inv-slot" onclick="useItem(0, 2)"></div>
            </div>
            <div id="p0-status" style="height: 20px; margin-top: 5px; color: var(--accent-yellow);"></div>
        </div>

        <div id="gun-system">🔫</div>

        <div id="p1-card" class="player-card">
            <div class="name-tag" onclick="renamePlayer(1)">PLAYER 2</div>
            <div id="p1-tier" style="font-size: 0.7rem; margin-bottom: 10px;">ROOKIE</div>
            <div class="portrait" onclick="handleShoot(1)">👤</div>
            <div class="stats">
                LIVES: <span id="p1-lives">❤❤❤</span><br>
                EXP: <span id="p1-exp">0</span>
            </div>
            <div class="inventory" id="p1-inv">
                <div class="inv-slot" onclick="useItem(1, 0)"></div>
                <div class="inv-slot" onclick="useItem(1, 1)"></div>
                <div class="inv-slot" onclick="useItem(1, 2)"></div>
            </div>
            <div id="p1-status" style="height: 20px; margin-top: 5px; color: var(--accent-yellow);"></div>
        </div>
    </div>

    <div id="footer">
        <div id="ammo-display">● ● ● ● ● ●</div>
    </div>

    <div id="event-log"></div>
</div>

<div id="end-screen">
    <h1 id="winner-text" style="color: var(--accent-yellow);">PLAYER 1 WINS</h1>
    <div class="stat-grid" id="end-stats"></div>
    <button onclick="location.reload()" style="margin-top: 30px; padding: 10px 20px; cursor: pointer;">REMATCH</button>
</div>

<script>
    // --- Constants & State ---
    const ROUND_TYPES = { LIVE: '🔴', BLANK: '🔵', FIRE: '🔥' };
    const ITEMS = [
        { name: 'Medkit', icon: '💉', effect: 'heal' },
        { name: 'Handcuffs', icon: '⛓️', effect: 'skip' },
        { name: 'Magnifier', icon: '🔍', effect: 'inspect' },
        { name: 'Dice', icon: '🎲', effect: 'shuffle' },
        { name: 'Chronos', icon: '⏳', effect: 'extend' }
    ];

    let state = {
        currentRound: 1,
        maxRounds: 5,
        turn: 0, // 0 or 1
        chamber: [],
        chamberIdx: 0,
        canShoot: true,
        bonusShot: false,
        players: [
            { name: "PLAYER 1", lives: 3, exp: 0, inv: [], portraitIdx: 0, stats: { shots: 0, self: 0, items: 0 } },
            { name: "PLAYER 2", lives: 3, exp: 0, inv: [], portraitIdx: 0, stats: { shots: 0, self: 0, items: 0 } }
        ],
        isSkipped: false
    };

    const portraits = ["👤", "💀", "👺", "🤡", "🤖", "🤠"];

    // --- Core Logic ---
    function initChamber() {
        let pool = ['LIVE', 'LIVE', 'BLANK', 'BLANK', 'BLANK', 'FIRE'];
        state.chamber = pool.sort(() => Math.random() - 0.5);
        state.chamberIdx = 0;
        updateUI();
    }

    function handleShoot(targetIdx) {
        if (!state.canShoot) return;
        
        const isSelf = (targetIdx === state.turn);
        const bullet = state.chamber[state.chamberIdx];
        state.canShoot = false;
        
        state.players[state.turn].stats.shots++;
        if (isSelf) state.players[state.turn].stats.self++;

        // Visual Feedback
        flashScreen(bullet, targetIdx);
        
        setTimeout(() => {
            processShot(bullet, targetIdx, isSelf);
        }, 600);
    }

    function processShot(type, targetIdx, isSelf) {
        let nextTurn = 1 - state.turn;
        let grantBonus = false;

        if (type === 'LIVE' || type === 'FIRE') {
            const dmg = (type === 'FIRE') ? 2 : 1;
            state.players[targetIdx].lives -= dmg;
            state.players[targetIdx].exp = Math.max(0, state.players[targetIdx].exp - (dmg * 10));
            showToast(`${state.players[state.turn].name} hit ${state.players[targetIdx].name}!`);
        } else {
            showToast("CLICK. It's a blank.");
            if (isSelf) {
                state.players[state.turn].exp += 15;
                if (!state.bonusShot) {
                    grantBonus = true;
                    showStatus(state.turn, "BONUS SHOT", "var(--accent-yellow)");
                }
            }
        }

        state.chamberIdx++;
        checkGameEnd();

        if (state.players[0].lives <= 0 || state.players[1].lives <= 0) {
            endMatch();
            return;
        }

        if (state.chamberIdx >= 6) {
            nextMatchRound();
        } else {
            if (grantBonus) {
                state.bonusShot = true;
                state.canShoot = true;
            } else {
                state.bonusShot = false;
                startTurn(nextTurn);
            }
        }
        updateUI();
    }

    function startTurn(idx) {
        if (state.isSkipped) {
            state.isSkipped = false;
            showToast(`${state.players[idx].name} was skipped!`);
            state.turn = 1 - idx;
        } else {
            state.turn = idx;
        }
        state.canShoot = true;
        updateUI();
    }

    function nextMatchRound() {
        state.currentRound++;
        if (state.currentRound > state.maxRounds) {
            endMatch();
            return;
        }
        showToast(`ROUND ${state.currentRound}`);
        initChamber();
        awardItems();
        startTurn(0);
    }

    // --- Items ---
    function awardItems() {
        state.players.forEach((p, i) => {
            if (Math.random() > 0.4 && p.inv.length < 3) {
                const item = ITEMS[Math.floor(Math.random() * ITEMS.length)];
                p.inv.push(item);
                showToast(`${p.name} found ${item.name}`);
            } else {
                showToast(`${p.name} found nothing.`);
            }
        });
    }

    function useItem(pIdx, slotIdx) {
        if (state.turn !== pIdx || !state.canShoot) return;
        const item = state.players[pIdx].inv[slotIdx];
        if (!item) return;

        state.players[pIdx].inv.splice(slotIdx, 1);
        state.players[pIdx].stats.items++;

        switch(item.effect) {
            case 'heal': 
                state.players[pIdx].lives = Math.min(3, state.players[pIdx].lives + 1);
                state.players[pIdx].exp += 5;
                showStatus(pIdx, "+1 LIFE", "var(--heal-green)");
                break;
            case 'skip':
                state.isSkipped = true;
                showStatus(1 - pIdx, "SKIPPED", "var(--accent-yellow)");
                break;
            case 'inspect':
                showToast(`Next round is ${state.chamber[state.chamberIdx]}`);
                break;
            case 'shuffle':
                let remaining = state.chamber.slice(state.chamberIdx);
                remaining.sort(() => Math.random() - 0.5);
                state.chamber.splice(state.chamberIdx, remaining.length, ...remaining);
                showToast("Chamber shuffled!");
                break;
            case 'extend':
                state.maxRounds++;
                showToast("Match extended!");
                break;
        }
        updateUI();
    }

    // --- Visuals & Audio ---
    function updateUI() {
        state.players.forEach((p, i) => {
            document.getElementById(`p${i}-lives`).innerText = "❤".repeat(Math.max(0, p.lives)) || "DEAD";
            document.getElementById(`p${i}-exp`).innerText = p.exp;
            document.getElementById(`p${i}-tier`).innerText = getTier(p.exp);
            document.getElementById(`p${i}-card`).className = `player-card ${state.turn === i ? 'active' : 'inactive'}`;
            
            const invSlots = document.getElementById(`p${i}-inv`).children;
            for(let s=0; s<3; s++) {
                invSlots[s].innerText = p.inv[s] ? p.inv[s].icon : "";
            }
        });

        document.getElementById('match-info').innerText = `ROUND ${state.currentRound} / ${state.maxRounds}`;
        document.getElementById('chamber-count').innerText = `${6 - state.chamberIdx}/6`;
        
        const ammoIcons = state.chamber.map((c, i) => i < state.chamberIdx ? '○' : '●').join(' ');
        document.getElementById('ammo-display').innerText = ammoIcons;
    }

    function flashScreen(bullet, targetIdx) {
        const card = document.getElementById(`p${targetIdx}-card`);
        const colors = { LIVE: 'var(--live-red)', BLANK: 'var(--blank-blue)', FIRE: 'var(--fire-orange)' };
        const color = colors[bullet];
        
        card.style.backgroundColor = color;
        setTimeout(() => card.style.backgroundColor = 'var(--panel-bg)', 400);
        
        // Basic Audio Synth
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = bullet === 'BLANK' ? 'triangle' : 'sawtooth';
        osc.frequency.setValueAtTime(bullet === 'BLANK' ? 100 : 50, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
        osc.start(); osc.stop(ctx.currentTime + 0.3);
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.opacity = 1;
        
        const log = document.getElementById('event-log');
        log.innerHTML += `<div>> ${msg}</div>`;
        log.scrollTop = log.scrollHeight;

        setTimeout(() => t.style.opacity = 0, 2500);
    }

    function showStatus(pIdx, msg, color) {
        const div = document.getElementById(`p${pIdx}-status`);
        div.innerText = msg;
        div.style.color = color;
        setTimeout(() => div.innerText = "", 2000);
    }

    function getTier(exp) {
        if (exp >= 90) return "MYTHIC";
        if (exp >= 75) return "VETERAN";
        if (exp >= 50) return "SPECIALIST";
        if (exp >= 25) return "SHARPSHOOTER";
        return "ROOKIE";
    }

    // --- Interaction ---
    window.addEventListener('mousemove', (e) => {
        if (!state.canShoot) return;
        const gun = document.getElementById('gun-system');
        const arena = document.getElementById('arena').getBoundingClientRect();
        const centerX = arena.left + arena.width / 2;
        
        // Rotate Gun
        const angle = Math.atan2(e.clientY - (arena.top + arena.height/2), e.clientX - centerX);
        const deg = angle * (180 / Math.PI);
        
        // 3D Flip Illusion
        const flip = (e.clientX < centerX) ? "scaleY(-1)" : "scaleY(1)";
        gun.style.transform = `translate(-50%, -50%) rotate(${deg}deg) ${flip}`;
    });

    window.addEventListener('keydown', (e) => {
        if (e.key === '1') cyclePortrait(0);
        if (e.key === '2') cyclePortrait(1);
        if (e.key.toLowerCase() === 'p') {
            const log = document.getElementById('event-log');
            log.style.display = log.style.display === 'block' ? 'none' : 'block';
        }
    });

    function cyclePortrait(idx) {
        state.players[idx].portraitIdx = (state.players[idx].portraitIdx + 1) % portraits.length;
        document.querySelectorAll('.portrait')[idx].innerText = portraits[state.players[idx].portraitIdx];
    }

    function renamePlayer(idx) {
        const newName = prompt("Enter Name:", state.players[idx].name);
        if (newName) {
            state.players[idx].name = newName.toUpperCase().substring(0, 12);
            document.querySelectorAll('.name-tag')[idx].innerText = state.players[idx].name;
        }
    }

    // --- Dynamic Shadows ---
    const canvas = document.getElementById('lighting-overlay');
    const ctx = canvas.getContext('2d');

    function drawShadows() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const light = { x: canvas.width / 2, y: canvas.height / 2 - 100 };
        const cards = document.querySelectorAll('.player-card');

        cards.forEach(card => {
            const rect = card.getBoundingClientRect();
            const corners = [
                {x: rect.left, y: rect.top},
                {x: rect.right, y: rect.top},
                {x: rect.right, y: rect.bottom},
                {x: rect.left, y: rect.bottom}
            ];

            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            corners.forEach((c, i) => {
                const next = corners[(i + 1) % 4];
                const end1 = { x: c.x + (c.x - light.x) * 10, y: c.y + (c.y - light.y) * 10 };
                const end2 = { x: next.x + (next.x - light.x) * 10, y: next.y + (next.y - light.y) * 10 };

                ctx.beginPath();
                ctx.moveTo(c.x, c.y);
                ctx.lineTo(next.x, next.y);
                ctx.lineTo(end2.x, end2.y);
                ctx.lineTo(end1.x, end1.y);
                ctx.fill();
            });
        });

        requestAnimationFrame(drawShadows);
    }

    function endMatch() {
        const p1 = state.players[0];
        const p2 = state.players[1];
        let winnerText = "DRAW MATCH";
        if (p1.lives > p2.lives) winnerText = `${p1.name} WINS`;
        else if (p2.lives > p1.lives) winnerText = `${p2.name} WINS`;

        document.getElementById('winner-text').innerText = winnerText;
        document.getElementById('end-screen').style.display = 'flex';
        
        const statsHtml = `
            <div>
                <h3>${p1.name}</h3>
                Lives: ${p1.lives}<br>EXP: ${p1.exp}<br>Shots: ${p1.stats.shots}<br>Self-shots: ${p1.stats.self}
            </div>
            <div>
                <h3>${p2.name}</h3>
                Lives: ${p2.lives}<br>EXP: ${p2.exp}<br>Shots: ${p2.stats.shots}<br>Self-shots: ${p2.stats.self}
            </div>
        `;
        document.getElementById('end-stats').innerHTML = statsHtml;
    }

    function checkGameEnd() {
        if (state.players[0].lives <= 0 || state.players[1].lives <= 0) {
            state.canShoot = false;
        }
    }

    // --- Init ---
    initChamber();
    drawShadows();
</script>

</body>
</html>
