<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rogue Roulette</title>

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  overflow:hidden;
  font-family:Georgia, serif;
  background:
    linear-gradient(rgba(0,0,0,.82),rgba(0,0,0,.82)),
    url("https://static.vecteezy.com/system/resources/thumbnails/007/995/476/small/brick-wall-background-seamless-texture-pattern-illustration-free-vector.jpg");
  background-size:300px;
  color:white;
}

#game{
  width:100vw;
  height:100vh;
  position:relative;
  overflow:hidden;
}

/* ================= LIGHT ================= */

#lightGlow{
  position:absolute;
  width:700px;
  height:700px;
  border-radius:50%;
  pointer-events:none;
  background:
    radial-gradient(circle,
      rgba(255,220,140,.30) 0%,
      rgba(255,190,90,.15) 25%,
      rgba(255,170,60,.06) 45%,
      transparent 70%);
  z-index:0;
  mix-blend-mode:screen;
}

#lamp{
  position:absolute;
  top:-10px;
  left:50%;
  width:120px;
  height:220px;
  transform-origin:top center;
  animation:swing 4s ease-in-out infinite alternate;
  z-index:1;
}

#lamp::before{
  content:'';
  position:absolute;
  width:5px;
  height:170px;
  background:#111;
  left:58px;
}

#lamp::after{
  content:'';
  position:absolute;
  width:80px;
  height:80px;
  border-radius:50%;
  background:
    radial-gradient(circle,#fff4c2 0%,#ffc45c 35%,#663c10 100%);
  bottom:0;
  left:20px;
}

@keyframes swing{
  from{transform:rotate(-12deg);}
  to{transform:rotate(12deg);}
}

/* ================= TOP INFO ================= */

#topBar{
  position:absolute;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  z-index:10;
  text-align:center;
}

#roundCounter{
  font-size:28px;
  letter-spacing:2px;
  margin-bottom:8px;
  color:#ffdd95;
}

#turnLabel{
  font-size:18px;
  color:#ccc;
}

/* ================= PLAYERS ================= */

#players{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 60px;
  z-index:5;
}

.player{
  position:relative;
  width:340px;
  background:rgba(20,20,20,.78);
  border:2px solid rgba(255,255,255,.08);
  backdrop-filter:blur(8px);
  padding:18px;
  transition:.25s;
  overflow:visible;
}

.player.active{
  border-color:#ffd84a;
  box-shadow:
    0 0 25px rgba(255,220,90,.55),
    inset 0 0 15px rgba(255,220,90,.12);
}

.player.inactive{
  filter:grayscale(.75) brightness(.75);
}

.shadow{
  position:absolute;
  inset:0;
  z-index:-1;
  pointer-events:none;
  opacity:.45;
  filter:blur(8px);
  background:black;
  clip-path:polygon(0 0,100% 0,100% 100%,0 100%);
}

.name{
  font-size:30px;
  margin-bottom:8px;
  cursor:pointer;
  user-select:none;
}

.portrait{
  font-size:110px;
  text-align:center;
  margin:10px 0;
}

.stats{
  display:flex;
  justify-content:space-between;
  margin-top:10px;
  gap:10px;
}

.statBox{
  flex:1;
  background:rgba(255,255,255,.05);
  padding:10px;
  text-align:center;
}

.inventory{
  display:flex;
  gap:8px;
  margin-top:14px;
}

.slot{
  flex:1;
  min-height:60px;
  background:rgba(0,0,0,.45);
  border:1px solid rgba(255,255,255,.1);
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:6px;
  cursor:pointer;
  transition:.2s;
  font-size:12px;
}

.slot:hover{
  background:rgba(255,255,255,.08);
}

/* ================= CENTER ================= */

#center{
  position:absolute;
  left:50%;
  top:52%;
  transform:translate(-50%,-50%);
  z-index:8;
  display:flex;
  flex-direction:column;
  align-items:center;
}

#gun{
  font-size:180px;
  transition:.2s;
  user-select:none;
}

/* ================= AMMO ================= */

#ammoBar{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  z-index:10;
}

.bullet{
  width:28px;
  height:54px;
  border-radius:8px 8px 4px 4px;
  background:linear-gradient(to bottom,#ffd067 0%,#8f5b1f 100%);
  border:2px solid rgba(0,0,0,.4);
  opacity:.25;
}

.bullet.live{opacity:1;}
.bullet.blank{
  background:linear-gradient(to bottom,#cfd2d6,#666);
  opacity:1;
}
.bullet.fire{
  background:linear-gradient(to bottom,#ffb347,#ff3c00);
  opacity:1;
}

/* ================= FX ================= */

.player.hit-red{
  animation:redGlow .7s;
}

.player.hit-blue{
  animation:blueGlow .7s;
}

.player.hit-orange{
  animation:orangeGlow .9s;
}

.player.hit-green{
  animation:greenGlow .9s;
}

@keyframes redGlow{
  0%{box-shadow:0 0 0 rgba(255,0,0,0);}
  50%{box-shadow:0 0 50px rgba(255,0,0,.9);}
  100%{box-shadow:0 0 0 rgba(255,0,0,0);}
}

@keyframes blueGlow{
  0%{box-shadow:0 0 0 rgba(80,180,255,0);}
  50%{box-shadow:0 0 50px rgba(80,180,255,.9);}
  100%{box-shadow:0 0 0 rgba(80,180,255,0);}
}

@keyframes orangeGlow{
  0%{box-shadow:0 0 0 rgba(255,120,0,0);}
  50%{box-shadow:0 0 60px rgba(255,120,0,1);}
  100%{box-shadow:0 0 0 rgba(255,120,0,0);}
}

@keyframes greenGlow{
  0%{box-shadow:0 0 0 rgba(0,255,120,0);}
  50%{box-shadow:0 0 60px rgba(0,255,120,1);}
  100%{box-shadow:0 0 0 rgba(0,255,120,0);}
}

/* ================= ITEM FLOAT ================= */

.floatItem{
  position:absolute;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  background:#111;
  border:1px solid rgba(255,255,255,.2);
  padding:10px 16px;
  z-index:999;
  animation:floatToInv 1.5s forwards ease;
  pointer-events:none;
}

@keyframes floatToInv{
  0%{
    opacity:0;
    transform:translate(-50%,0) scale(.5);
  }
  20%{
    opacity:1;
  }
  100%{
    opacity:0;
    transform:translate(var(--tx),var(--ty)) scale(.7);
  }
}

/* ================= OVERLAY ================= */

#overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.85);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:1000;
}

#endCard{
  width:700px;
  background:#111;
  padding:30px;
  border:2px solid rgba(255,255,255,.1);
}

button{
  margin-top:20px;
  padding:12px 18px;
  border:none;
  background:#ffbf52;
  color:black;
  cursor:pointer;
  font-weight:bold;
}

</style>
</head>
<body>

<div id="game">

<div id="lightGlow"></div>
<div id="lamp"></div>

<div id="topBar">
  <div id="roundCounter"></div>
  <div id="turnLabel"></div>
</div>

<div id="players">
  <div id="p1" class="player"></div>

  <div id="center">
    <div id="gun">🔫</div>
  </div>

  <div id="p2" class="player"></div>
</div>

<div id="ammoBar"></div>

<div id="overlay">
  <div id="endCard"></div>
</div>

</div>

<script>

const MAX_ROUNDS = 8;

const ROUND_TYPES = [
  "LIVE",
  "LIVE",
  "BLANK",
  "BLANK",
  "FIRE",
  "LIVE"
];

const ITEM_POOL = [
  "Heal",
  "Inspect",
  "Skip",
  "Shuffle",
  "Revive"
];

const players = [
  makePlayer("Player 1","🤠"),
  makePlayer("Player 2","😈")
];

function makePlayer(name,portrait){
  return {
    name,
    portrait,
    lives:5,
    inventory:[],
    dead:false,
    extraShot:false,
    shotThisTurn:false
  };
}

const game = {
  round:1,
  chamber:[],
  current:0,
  active:0,
  ended:false
};

reloadChamber();

function reloadChamber(){
  game.chamber = [...ROUND_TYPES].sort(()=>Math.random()-.5);
  game.current = 0;
}

function render(){

  document.getElementById("roundCounter").innerHTML =
    `ROUND ${game.round} / ${MAX_ROUNDS}`;

  document.getElementById("turnLabel").innerHTML =
    `${players[game.active].name}'s turn`;

  renderPlayer(0);
  renderPlayer(1);
  renderAmmo();
  updateShadows();
}

function renderPlayer(i){

  const p = players[i];
  const el = document.getElementById(i ? "p2" : "p1");

  el.className =
    "player " + (game.active === i ? "active" : "inactive");

  el.innerHTML = `
    <div class="shadow"></div>

    <div class="name">${p.name}</div>

    <div class="portrait">${p.portrait}</div>

    <div class="stats">

      <div class="statBox">
        <div>Lives</div>
        <h2>${p.lives}</h2>
      </div>

      <div class="statBox">
        <div>Inventory</div>
        <h2>${p.inventory.length}/3</h2>
      </div>

    </div>

    <div class="inventory">
      ${[0,1,2].map(slot=>{

        const item = p.inventory[slot];

        return `
          <div class="slot"
            onclick="event.stopPropagation();useItem(${i},${slot})">
            ${item || "Empty"}
          </div>
        `;

      }).join("")}
    </div>
  `;

  /* NAME CHANGE */
  el.querySelector(".name").onclick = (e)=>{
    e.stopPropagation();

    const n = prompt("Rename player",p.name);

    if(n && n.trim()){
      p.name = n.trim();
      render();
    }
  };

  /* SHOOT */
  el.onclick = ()=>shoot(i);
}

function renderAmmo(){

  const ammo = document.getElementById("ammoBar");

  ammo.innerHTML = "";

  for(let i=game.current;i<game.chamber.length;i++){

    const div = document.createElement("div");

    div.className = "bullet";

    const r = game.chamber[i];

    if(r === "LIVE") div.classList.add("live");
    if(r === "BLANK") div.classList.add("blank");
    if(r === "FIRE") div.classList.add("fire");

    ammo.appendChild(div);
  }
}

function shoot(targetIndex){

  if(game.ended) return;

  const shooter = players[game.active];
  const target = players[targetIndex];

  /* only one shot */
  if(shooter.shotThisTurn) return;

  shooter.shotThisTurn = true;

  if(game.current >= game.chamber.length){
    reloadChamber();
  }

  const round = game.chamber[game.current++];
  const selfShot = targetIndex === game.active;

  if(round === "LIVE"){

    target.lives -= 1;
    flash(targetIndex,"hit-red");

  }else if(round === "FIRE"){

    target.lives -= 2;
    flash(targetIndex,"hit-orange");

  }else{

    flash(targetIndex,"hit-blue");

    /* ONLY ONE EXTRA SHOT AFTER SELF BLANK */
    if(selfShot && !shooter.extraShot){

      shooter.extraShot = true;
      shooter.shotThisTurn = false;

      render();
      checkEnd();
      return;
    }
  }

  if(target.lives <= 0){
    target.dead = true;
  }

  afterShot();
}

function afterShot(){

  const p = players[game.active];

  /* PASS TURN */
  p.extraShot = false;
  p.shotThisTurn = false;

  game.active = 1 - game.active;

  /* round progression */
  if(game.active === 0){

    game.round++;

    if(game.round > 1){
      giveItems();
    }
  }

  render();
  checkEnd();
}

function useItem(playerIndex,slot){

  if(playerIndex !== game.active) return;

  const p = players[playerIndex];
  const item = p.inventory[slot];

  if(!item) return;

  p.inventory.splice(slot,1);

  if(item === "Heal"){
    p.lives++;
    flash(playerIndex,"hit-green");
  }

  if(item === "Inspect"){
    alert("Next round: " + game.chamber[game.current]);
  }

  if(item === "Skip"){
    game.active = playerIndex;
  }

  if(item === "Shuffle"){
    reloadChamber();
  }

  if(item === "Revive"){
    if(p.lives <= 0){
      p.lives = 2;
      p.dead = false;
      flash(playerIndex,"hit-green");
    }
  }

  render();
}

function giveItems(){

  players.forEach((p,i)=>{

    if(p.inventory.length >= 3) return;

    if(Math.random() < .75){

      const item =
        ITEM_POOL[Math.floor(Math.random()*ITEM_POOL.length)];

      p.inventory.push(item);

      animateItem(item,i);
    }
  });
}

function animateItem(item,playerIndex){

  const div = document.createElement("div");

  div.className = "floatItem";
  div.innerHTML = item;

  const tx = playerIndex === 0 ? "-500px" : "500px";
  const ty = "-350px";

  div.style.setProperty("--tx",tx);
  div.style.setProperty("--ty",ty);

  document.body.appendChild(div);

  setTimeout(()=>div.remove(),1500);
}

function flash(i,className){

  const el = document.getElementById(i ? "p2" : "p1");

  el.classList.add(className);

  setTimeout(()=>{
    el.classList.remove(className);
  },800);
}

function checkEnd(){

  /* ONLY END IF SOMEONE IS DEAD OR ALL ROUNDS OVER */

  const deadPlayer = players.find(p=>p.lives <= 0);

  if(deadPlayer || game.round > MAX_ROUNDS){

    game.ended = true;

    let winner = "DRAW";

    if(players[0].lives > players[1].lives){
      winner = players[0].name;
    }

    if(players[1].lives > players[0].lives){
      winner = players[1].name;
    }

    document.getElementById("overlay").style.display = "flex";

    document.getElementById("endCard").innerHTML = `
      <h1>${winner} WINS</h1>
      <br>

      <h2>${players[0].name}: ${players[0].lives} HP</h2>
      <h2>${players[1].name}: ${players[1].lives} HP</h2>

      <button onclick="location.reload()">
        Play Again
      </button>
    `;
  }
}

/* ================= REAL SHADOWS ================= */

function updateShadows(){

  const light = document.getElementById("lightGlow");
  const lightRect = light.getBoundingClientRect();

  const lx = lightRect.left + lightRect.width/2;
  const ly = lightRect.top + lightRect.height/2;

  document.querySelectorAll(".player").forEach(player=>{

    const shadow = player.querySelector(".shadow");
    const rect = player.getBoundingClientRect();

    const px = rect.left + rect.width/2;
    const py = rect.top + rect.height/2;

    const dx = px - lx;
    const dy = py - ly;

    shadow.style.transform =
      `translate(${dx*.12}px, ${dy*.12}px) skew(${-dx*.01}deg)`;

  });
}

/* ================= LIGHT FOLLOW ================= */

window.addEventListener("mousemove",(e)=>{

  const glow = document.getElementById("lightGlow");

  glow.style.left = (e.clientX - 350) + "px";
  glow.style.top = (e.clientY - 350) + "px";

  updateShadows();
});

/* ================= START ================= */

render();

</script>
</body>
</html>
