<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rogue Roulette</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  overflow:hidden;
  font-family:Georgia,serif;
  background:
    radial-gradient(circle at top,#3a3024 0%,#161311 40%,#0b0a09 100%);
  color:#ddd;
}
#game{
  perspective:1200px;
  width:100vw;
  height:100vh;
  position:relative;
}
.panel{
  background:rgba(30,26,23,.78);
  border:1px solid rgba(255,255,255,.08);
  backdrop-filter:blur(6px);
  box-shadow:
  0 30px 60px rgba(0,0,0,.6),
  0 5px 18px rgba(0,0,0,.9);
}
.player{
  position:absolute;
  top:50%;
  width:280px;
  transform:translateY(-50%);
  padding:18px;
  border-radius:4px;
  transition:.2s;
}
.player:hover{transform:translateY(-50%) scale(1.02)}
.player.active{outline:2px solid #9f7b4b}
.player.target{outline:2px solid #b44343;cursor:pointer}
#p1{left:40px}
#p2{right:40px}
.name{
  font-size:28px;
  cursor:pointer;
}
.portrait{
  font-size:110px;
  text-align:center;
  margin:10px 0;
  user-select:none;
}
.stat{
  margin:6px 0;
  color:#c6b79f;
}
.effects{
  min-height:22px;
  font-size:13px;
  color:#f0d4a4;
}
.inventory{
  display:flex;
  gap:8px;
  margin-top:12px;
}
.slot{
  flex:1;
  aspect-ratio:1/1;
  border:1px solid rgba(255,255,255,.25);
  background:rgba(0,0,0,.45);
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-size:11px;
  padding:4px;
  cursor:pointer;
  transition:.2s;
  box-shadow:0 10px 25px rgba(0,0,0,.6);
}
.slot:hover{background:rgba(255,255,255,.06)}
#center{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  width:340px;
  height:340px;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}
#gun{
  position:absolute;
  width:220px;
  transition:transform .2s ease;
  filter:drop-shadow(0 18px 16px rgba(0,0,0,.85));
  user-select:none;
  transform-origin:center center;
}
#gun img{
  width:100%;
  pointer-events:none;
}
#lamp{
  position:absolute;
  top:-40px;
  left:50%;
  width:10px;
  height:220px;
  transform-origin:top center;
  animation:swing 5s ease-in-out infinite alternate;
}
#lamp::before{
  content:'';
  position:absolute;
  width:4px;
  height:170px;
  background:#1f1a17;
  left:3px;
}
#lamp::after{
  content:'';
  position:absolute;
  bottom:0;
  left:-28px;
  width:64px;
  height:64px;
  border-radius:50%;
  background:radial-gradient(circle,#f0c67a 0%,#7f6137 30%,#261d14 70%);
  box-shadow:
    0 0 120px rgba(255,205,120,.45),
    0 0 240px rgba(255,205,120,.2);
}
@keyframes swing{
  from{transform:rotate(-10deg)}
  to{transform:rotate(10deg)}
}
}
#chamber{
  position:absolute;
  top:30px;
  font-size:42px;
  color:#cfb28b;
  letter-spacing:4px;
}
#turnLabel{
  position:absolute;
  bottom:35px;
  color:#9e8a6d;
  font-size:18px;
}
#toast{
  position:absolute;
  top:25px;
  left:50%;
  transform:translateX(-50%);
  padding:14px 22px;
  border-radius:2px;
  background:rgba(0,0,0,.7);
  opacity:0;
  transition:.35s;
  pointer-events:none;
}
#log,#controls{
  position:absolute;
  bottom:20px;
  width:320px;
  max-height:250px;
  overflow:auto;
  padding:14px;
  border-radius:2px;
  font-size:13px;
}
#log{left:20px;display:none}
#controls{right:20px;display:none}
.logEntry{margin-bottom:8px;color:#bba98c}
.flash{
  animation:flash .45s ease;
}
@keyframes flash{
  0%{filter:brightness(2)}
  100%{filter:brightness(1)}
}
.life{
  color:#c94f4f;
}
.expbar{
  width:100%;
  height:10px;
  background:#191614;
  border-radius:999px;
  overflow:hidden;
  margin-top:6px;
}
.expfill{
  height:100%;
  background:linear-gradient(to right,#85603c,#d0a56d);
}
#overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.78);
  display:none;
  align-items:center;
  justify-content:center;
}
#endCard{
  width:700px;
  padding:28px;
  border-radius:2px;
}
button{
  background:#5f4530;
  color:#eee;
  border:none;
  padding:12px 18px;
  border-radius:0px;
  cursor:pointer;
}
button:hover{background:#7a5b3f}
.small{font-size:12px;color:#9f907b}
</style>
</head>
<body>
<div id="game">

<div id="toast"></div>

<div id="p1" class="player panel"></div>
<div id="p2" class="player panel"></div>

<div id="lamp"></div>
<div id="center">
  <div id="chamber">6/6</div>
  <div id="gun"><img src="https://cdn.creazilla.com/cliparts/3868192/power-drill-clipart-md.png"></div>
  <div id="turnLabel"></div>
</div>

<div id="log" class="panel"></div>
<div id="controls" class="panel">
<b>Controls</b><br><br>
1 - Change Player 1 portrait<br>
2 - Change Player 2 portrait<br>
C - Toggle controls<br>
P - Toggle log<br><br>
Click portraits to shoot.<br>
Click items to use them.
</div>

<div id="overlay">
  <div id="endCard" class="panel"></div>
</div>

</div>

<script>
const portraits=["🕴️","🤠","😈","🃏","💀","🎩","🪖","👤"];

const ROUND_TYPES=[
  "LIVE","LIVE","BLANK","FIRE","BLANK","REVIVE"
];

const RELOADS_PER_MATCH=5;

const ITEMS=[
  {name:"Healing",rarity:.35},
  {name:"Skip Turn",rarity:.2},
  {name:"Inspect",rarity:.18},
  {name:"Randomizer",rarity:.15},
  {name:"Extra Round",rarity:.06}
];

const game={
  roundLimit:5,
  roundNumber:1,
  chamber:[],
  current:0,
  reloadsLeft:RELOADS_PER_MATCH,
  active:0,
  bonus:false,
  inspection:null,
  turnBlocked:[false,false],
  log:[]
};

const stats=[
  {shots:0,self:0,items:0,damage:0,bonus:0},
  {shots:0,self:0,items:0,damage:0,bonus:0}
];

const players=[
  makePlayer("Player 1",0),
  makePlayer("Player 2",1)
];

function makePlayer(name,i){
  return {
    id:i,
    name,
    portrait:portraits[i],
    lives:3,
    exp:0,
    effects:[],
    skips:0
  }
}

const inventories=[[],[]];

function tier(exp){
  if(exp>=90)return "Mythic";
  if(exp>=75)return "Veteran";
  if(exp>=50)return "Specialist";
  if(exp>=25)return "Sharpshooter";
  return "Rookie";
}

function refill(){
  game.chamber=[...ROUND_TYPES].sort(()=>Math.random()-.5);
  game.current=0;
}
refill();

function render(){
  players.forEach((p,i)=>{
    const el=document.getElementById(i?"p2":"p1");
    el.className="player panel"+(game.active===i?" active":"");
    el.innerHTML=`
      <div class="name" onclick="renamePlayer(${i})">${p.name}</div>
      <div class="small">${tier(p.exp)}</div>
      <div class="portrait">${p.portrait}</div>
      <div class="stat">Lives: ${"♥".repeat(p.lives)} <span class="life">${p.lives}</span></div>
      <div class="stat">EXP: ${p.exp}/100</div>
      <div class="expbar"><div class="expfill" style="width:${p.exp}%"></div></div>
      <div class="effects">${p.effects.join(" • ")}</div>
      <div class="inventory">
        ${[0,1,2].map(s=>`
          <div class="slot" onclick="event.stopPropagation();useItem(${i},${s})">
            ${inventories[i][s]||"Empty"}
          </div>`).join("")}
      </div>
    `;

    if(game.active===i){
      el.classList.add("target");
      el.onclick=()=>shoot(i);
    }else{
      el.classList.add("target");
      el.onclick=()=>shoot(i);
    }
  });

  document.getElementById("chamber").textContent=`${6-game.current}/6 • Reloads ${game.reloadsLeft}/${RELOADS_PER_MATCH}`;
  document.getElementById("turnLabel").textContent=`${players[game.active].name}'s Turn`;

  const log=document.getElementById("log");
  log.innerHTML=game.log.slice(-25).reverse().map(l=>`<div class='logEntry'>${l}</div>`).join("");
}

function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;
  t.style.opacity=1;
  clearTimeout(t._timer);
  t._timer=setTimeout(()=>t.style.opacity=0,3000);
}

function addLog(msg){
  game.log.push(msg);
  toast(msg);
  render();
}

function renamePlayer(i){
  const n=prompt("Enter new name",players[i].name);
  if(n)players[i].name=n;
  render();
}

function shoot(targetIndex){
  const shooter=players[game.active];
  const target=players[targetIndex];

  stats[game.active].shots++;
  if(targetIndex===game.active)stats[game.active].self++;

  if(game.current>=game.chamber.length){
    if(game.reloadsLeft>0){
      game.reloadsLeft--;
      refill();
      addLog('The revolver reloads.');
    }
  }

  const round=game.chamber[game.current++];

  if(round==="LIVE"){
    target.lives=Math.max(0,target.lives-1);
    target.exp=Math.max(0,target.exp-15);
    stats[game.active].damage++;
    effect(targetIndex,"LIVE HIT");
    addLog(`${shooter.name} fires LIVE at ${target.name}.`);
  }

  if(round==="BLANK"){
    effect(targetIndex,"BLANK");
    addLog(`${shooter.name} fires a BLANK.`);

    if(targetIndex===game.active && !game.bonus){
      shooter.exp=Math.min(100,shooter.exp+18);
      game.bonus=true;
      stats[game.active].bonus++;
      addLog(`${shooter.name} survives the self-shot and gains a bonus shot.`);
      render();
      checkEnd();
      return;
    }
  }

  if(round==="FIRE"){
    target.lives=Math.max(0,target.lives-1);
    target.exp=Math.max(0,target.exp-25);
    stats[game.active].damage++;
    effect(targetIndex,"FIRE");
    addLog(`${shooter.name} unleashes a FIRE round at ${target.name}.`);
  }

  if(round==="REVIVE"){
    target.lives=Math.min(3,target.lives+1);
    target.exp=Math.min(100,target.exp+10);
    effect(targetIndex,"REVIVE");
    addLog(`${target.name} is revived by the chamber.`);
  }

  if(game.current>=game.chamber.length){
    if(game.reloadsLeft>0){
      game.reloadsLeft--;
      refill();
      addLog('The revolver reloads.');
    }
  }

  rewardPhase();

  if(game.bonus){
    game.bonus=false;
  }else{
    nextTurn();
  }

  checkEnd();
  render();
}

function nextTurn(){
  game.active=1-game.active;

  if(game.turnBlocked[game.active]){
    addLog(`${players[game.active].name}'s turn was skipped.`);
    game.turnBlocked[game.active]=false;
    game.active=1-game.active;
  }

  game.roundNumber++;
}

function rewardPhase(){
  players.forEach((p,i)=>{
    if(inventories[i].length>=3)return;

    const roll=Math.random();

    if(roll<0.45){
      addLog(`${p.name} found nothing.`);
      return;
    }

    const item=weightedItem();
    inventories[i].push(item);
    addLog(`${p.name} found ${item}.`);
  });
}

function weightedItem(){
  const r=Math.random();

  if(r<.35)return "Healing";
  if(r<.58)return "Skip Turn";
  if(r<.78)return "Inspect";
  if(r<.94)return "Randomizer";
  return "Extra Round";
}

function useItem(playerIndex,slot){
  if(playerIndex!==game.active)return;

  const p=players[playerIndex];
  const item=inventories[playerIndex][slot];
  if(!item)return;

  inventories[playerIndex].splice(slot,1);
  stats[playerIndex].items++;

  if(item==="Healing"){
    p.lives=Math.min(3,p.lives+1);
    p.exp=Math.min(100,p.exp+12);
    effect(playerIndex,"HEALING");
    addLog(`${p.name} used Healing.`);
  }

  if(item==="Skip Turn"){
    game.turnBlocked[1-playerIndex]=true;
    effect(1-playerIndex,"SKIPPED TURN");
    addLog(`${players[1-playerIndex].name} will lose their next turn.`);
  }

  if(item==="Inspect"){
    const next=game.chamber[game.current];
    addLog(`The next round is ${next}.`);
  }

  if(item==="Randomizer"){
    const remain=game.chamber.slice(game.current).sort(()=>Math.random()-.5);
    game.chamber=[...game.chamber.slice(0,game.current),...remain];
    addLog(`${p.name} shuffled the chamber.`);
  }

  if(item==="Extra Round"){
    game.roundLimit++;
    addLog(`${p.name} extended the match.`);
  }

  render();
}

function effect(i,text){
  players[i].effects=[text];
  setTimeout(()=>{
    players[i].effects=[];
    render();
  },2000);

  const el=document.getElementById(i?"p2":"p1");
  el.classList.add("flash");
  setTimeout(()=>el.classList.remove("flash"),400);
}

function checkEnd(){
  const dead=players.find(p=>p.lives<=0);

  if(dead || game.roundNumber>game.roundLimit){
    endGame();
  }
}

function endGame(){
  let winner="Draw";

  if(players[0].lives>players[1].lives)winner=players[0].name;
  else if(players[1].lives>players[0].lives)winner=players[1].name;

  const card=document.getElementById("endCard");

  card.innerHTML=`
    <h1>${winner==='Draw'?'Draw':winner+' Wins'}</h1>
    <hr>
    ${players.map((p,i)=>`
      <h2>${p.name}</h2>
      Lives: ${p.lives}<br>
      EXP: ${p.exp}<br>
      Shots Taken: ${stats[i].shots}<br>
      Self Shots: ${stats[i].self}<br>
      Bonus Shots: ${stats[i].bonus}<br>
      Items Used: ${stats[i].items}<br>
      Damage Dealt: ${stats[i].damage}<br><br>
    `).join("")}
    <button onclick="location.reload()">Play Again</button>
  `;

  document.getElementById("overlay").style.display="flex";
}

window.addEventListener("mousemove",e=>{
  const gun=document.getElementById("gun");
  const left=e.clientX<window.innerWidth/2;
  gun.style.transform=left?'scaleX(-1)':'scaleX(1)';
});

window.addEventListener("keydown",e=>{
  if(e.key==='1'){
    cyclePortrait(0);
  }
  if(e.key==='2'){
    cyclePortrait(1);
  }
  if(e.key.toLowerCase()==='p'){
    toggle('log');
  }
  if(e.key.toLowerCase()==='c'){
    toggle('controls');
  }
});

function toggle(id){
  const el=document.getElementById(id);
  el.style.display=el.style.display==='block'?'none':'block';
}

function cyclePortrait(i){
  const p=players[i];
  const idx=portraits.indexOf(p.portrait);
  p.portrait=portraits[(idx+1)%portraits.length];
  render();
}

render();
addLog('Rogue Roulette begins.');
</script>
</body>
</html>
