<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rogue Roulette</title>
    <style>
        :root {
            --bg-dark: #030303;
            --panel-bg: rgba(10, 10, 10, 0.95);
            --accent-yellow: #ffb800;
            --live-red: #ff1a1a;
            --blank-blue: #1a8cff;
            --fire-orange: #ff5500;
            --heal-green: #1aff1a;
            --poison-purple: #8800cc;
            --text-dim: #777;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            color: #ddd;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 100vw; height: 100vh;
            background-image: radial-gradient(circle at 50% 50%, rgba(20,20,20,0.7) 0%, rgba(0,0,0,0.98) 80%), 
                              url('https://static.vecteezy.com/system/resources/thumbnails/007/995/476/small/brick-wall-background-seamless-texture-pattern-illustration-free-vector.jpg');
            background-repeat: repeat;
            background-blend-mode: multiply;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
        }

        #pendulum-container {
            position: absolute; top: 0; left: 50%;
            width: 2px; height: 350px;
            background: #222;
            transform-origin: top center;
            animation: swing 6s ease-in-out infinite;
            z-index: 20; /* Keep above shadows */
        }
        #light-bulb {
            position: absolute; bottom: -20px; left: -10px;
            width: 20px; height: 20px;
            background: #fff; border-radius: 50%;
            box-shadow: 0 0 40px 15px rgba(255, 255, 255, 0.2);
        }
        @keyframes swing {
            0%, 100% { transform: rotate(8deg); }
            50% { transform: rotate(-8deg); }
        }

        #lighting-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 15;
            mix-blend-mode: multiply; /* Realistic darkness */
        }

        #room-flash {
            position: absolute; inset: 0;
            pointer-events: none; opacity: 0;
            transition: opacity 0.18s ease;
            z-index: 25;
            mix-blend-mode: screen;
        }

        /* Screens */
        .screen {
            position: fixed; inset: 0; background: rgba(5,5,5,0.98);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100;
        }
        #main-menu { background: #050505; }
        .lobby-row { display: flex; gap: 50px; margin-bottom: 30px; }
        .lobby-card { background: #111; padding: 20px; border: 1px solid #333; text-align: center; width: 250px; border-radius: 8px;}
        input[type="text"] { background: #000; color: var(--accent-yellow); border: 1px solid #444; padding: 8px; text-align: center; margin-bottom: 10px; width: 80%; font-family: inherit; }
        input[type="file"] { margin-top: 10px; font-size: 0.8rem; width: 100%; color: #888;}
        button { cursor: pointer; padding: 10px 20px; background: #222; color: white; border: 1px solid #444; font-family: inherit; margin-top: 5px; border-radius: 4px; transition: all 0.2s;}
        button:hover { background: var(--accent-yellow); color: black; border-color: var(--accent-yellow); }
        button:disabled { cursor: not-allowed; opacity: 0.35; }

        /* Arena */
        #arena {
            position: relative; width: 100%; flex-grow: 1;
            display: flex; justify-content: space-around; align-items: center;
            z-index: 10; padding-top: 80px;
        }

        .player-card {
            width: 240px; padding: 20px;
            background: var(--panel-bg);
            border: 2px solid #222; border-radius: 8px;
            text-align: center; transition: background-color 0.4s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }
        .player-card.active { border-color: var(--accent-yellow); box-shadow: 0 0 40px rgba(255, 184, 0, 0.15); }

        .portrait {
            width: 130px; height: 130px; margin: 0 auto 15px;
            background-color: #0a0a0a; background-size: cover; background-position: center;
            border: 4px solid #222; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 5rem; cursor: crosshair; transition: border-color 0.2s, transform 0.1s;
        }
        .portrait:active { transform: scale(0.95); }
        .active .portrait:hover { border-color: var(--live-red); }

        .inventory { display: flex; justify-content: center; gap: 8px; margin-top: 10px; }
        .inv-slot { width: 45px; height: 45px; font-size: 1.3rem; position: relative; background: #0a0a0a; border: 1px solid #333; cursor: pointer; transition: border-color 0.2s, opacity 0.2s; }
        
        /* Gun Graphics */
        #gun-system {
            position: absolute; top: 55%; left: 50%;
            width: 140px; height: 80px;
            margin-left: -70px; margin-top: -40px;
            pointer-events: none; z-index: 30;
            display: flex; align-items: center; justify-content: center;
            transition: left 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .gun-emoji { 
            font-size: 5.5rem; 
            filter: drop-shadow(0 15px 10px rgba(0,0,0,0.9)); 
            transform-origin: center center;
            display: inline-block;
        }

        .heart { display: inline-block; margin: 0 2px; text-shadow: 0 0 5px rgba(255,0,0,0.5); font-size: 1.4rem; }

        #toast {
            position: absolute; top: 120px; left: 50%; transform: translateX(-50%);
            padding: 15px 30px; background: rgba(5,5,5,0.95); border: 1px solid var(--accent-yellow);
            color: var(--accent-yellow); border-radius: 5px; opacity: 0; transition: opacity 0.5s; z-index: 200; pointer-events: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8); font-weight: bold; letter-spacing: 2px;
        }

        @keyframes prep-shake {
            0% { transform: translate(0, 0); }
            25% { transform: translate(-4px, 4px); }
            50% { transform: translate(4px, -2px); }
            75% { transform: translate(-2px, -4px); }
            100% { transform: translate(2px, 2px); }
        }
        .prep-shaking .gun-emoji { animation: prep-shake 0.08s infinite; }

        .dead-tumble {
            animation: tumble-death 1.5s cubic-bezier(0.55, 0.085, 0.68, 0.53) forwards;
            pointer-events: none; border-color: #111;
        }
        @keyframes tumble-death {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(120vh) rotate(180deg); opacity: 0; }
        }

        #round-transition {
            position: fixed; inset: 0; background: rgba(5,5,5,0.98);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 300; transform: translateY(-100%); transition: transform 0.6s cubic-bezier(0.85, 0, 0.15, 1);
            border-bottom: 2px solid var(--accent-yellow);
        }
    </style>
</head>
<body>

<div id="main-menu" class="screen">
    <h1 style="color: var(--accent-yellow); font-size: 3.5rem; letter-spacing: 12px; text-shadow: 0 0 20px rgba(255,184,0,0.3); margin-bottom: 40px;">ROGUE ROULETTE</h1>
    <div class="lobby-row">
        <div class="lobby-card">
            <h3 style="color: #aaa;">PLAYER 1</h3>
            <input type="text" id="p0-name-in" value="PLAYER 1" maxlength="12">
            <div id="p0-portrait-display" class="portrait" style="margin-top: 10px; cursor: default; border-color: #222;">👤</div>
            <button onclick="cyclePortLobby(0)">Random Emoji</button>
            <input type="file" id="p0-img-upload" accept="image/*" onchange="handleImageUpload(0, event)">
        </div>
        <div class="lobby-card">
            <h3 style="color: #aaa;">PLAYER 2</h3>
            <input type="text" id="p1-name-in" value="PLAYER 2" maxlength="12">
            <div id="p1-portrait-display" class="portrait" style="margin-top: 10px; cursor: default; border-color: #222;">👤</div>
            <button onclick="cyclePortLobby(1)">Random Emoji</button>
            <input type="file" id="p1-img-upload" accept="image/*" onchange="handleImageUpload(1, event)">
        </div>
    </div>
    <button style="font-size: 1.5rem; padding: 15px 60px; margin-top: 20px; font-weight: bold; letter-spacing: 3px;" onclick="startGame()">START DUEL</button>
</div>

<div id="round-transition">
    <h1 id="rt-title" style="color: var(--accent-yellow); font-size: 4rem; letter-spacing: 10px; margin-bottom: 10px;">ROUND 2</h1>
    <h2 style="color: #555; font-size: 2rem;">STARTING IN <span id="rt-countdown" style="color: #fff;">6</span>...</h2>
</div>

<div id="game-container">
    <div id="pendulum-container"><div id="light-bulb"></div></div>
    <div id="room-flash"></div>
    <canvas id="lighting-overlay"></canvas>

    <div id="header" style="text-align: center; padding: 25px; z-index: 10; width: 100%;">
        <div id="match-info" style="font-size: 1.5rem; color: var(--accent-yellow); font-weight: bold; letter-spacing: 2px;">ROUND 1 / 5</div>
        <div id="ammo-display" style="margin-top: 5px;"></div>
    </div>

    <div id="toast">Message here</div>

    <div id="arena">
        <div id="p0-card" class="player-card">
            <div class="name-tag" id="p0-name-tag" style="font-weight: bold; font-size: 1.2rem;">PLAYER 1</div>
            <div id="p0-tier" style="font-size: 0.75rem; margin-bottom: 15px; color: #666;">ROOKIE</div>
            <div class="portrait" id="p0-portrait" onclick="handleShoot(0)">👤</div>
            <div id="p0-lives" style="margin-bottom: 10px; height: 25px;"></div>
            <div class="inventory" id="p0-inv">
                <button class="inv-slot" onclick="useItem(0, 0)"></button>
                <button class="inv-slot" onclick="useItem(0, 1)"></button>
                <button class="inv-slot" onclick="useItem(0, 2)"></button>
            </div>
            <div id="p0-status" style="height: 20px; font-size: 0.85rem; margin-top: 8px;"></div>
        </div>

        <div id="gun-system">
            <div class="gun-emoji" id="gun-emoji">🔫</div>
        </div>

        <div id="p1-card" class="player-card">
            <div class="name-tag" id="p1-name-tag" style="font-weight: bold; font-size: 1.2rem;">PLAYER 2</div>
            <div id="p1-tier" style="font-size: 0.75rem; margin-bottom: 15px; color: #666;">ROOKIE</div>
            <div class="portrait" id="p1-portrait" onclick="handleShoot(1)">👤</div>
            <div id="p1-lives" style="margin-bottom: 10px; height: 25px;"></div>
            <div class="inventory" id="p1-inv">
                <button class="inv-slot" onclick="useItem(1, 0)"></button>
                <button class="inv-slot" onclick="useItem(1, 1)"></button>
                <button class="inv-slot" onclick="useItem(1, 2)"></button>
            </div>
            <div id="p1-status" style="height: 20px; font-size: 0.85rem; margin-top: 8px;"></div>
        </div>
    </div>

    <div id="footer" style="padding: 25px; z-index: 10; width: 100%; text-align: center;">
        <span style="color: #666; font-size: 1.1rem;">CHAMBER: <span id="chamber-count" style="color: #aaa;">6/6</span></span>
    </div>
</div>

<div id="end-screen" class="screen" style="display: none;">
    <h1 id="winner-text" style="color: var(--accent-yellow); font-size: 4rem;">MATCH OVER</h1>
    <button onclick="rematch()" style="font-size: 1.2rem; padding: 15px 40px;">REMATCH</button>
</div>

<script>
    const ITEMS = [
        { name: 'Medkit', icon: '💉', effect: 'heal', desc: "Heals 1 life." },
        { name: 'Handcuffs', icon: '⛓️', effect: 'skip', desc: 'Skips opponent turn.' },
        { name: 'Magnifier', icon: '🔍', effect: 'inspect', desc: 'Reveals current round.' },
        { name: 'Dice', icon: '🎲', effect: 'shuffle', desc: 'Shuffles chamber.' }
    ];

    let state = {
        turn: 0,
        chamber: [],
        chamberIdx: 0,
        currentRound: 1,
        maxRounds: 5,
        canShoot: true,
        gunFacing: 1,
        players: [
            { name: "P1", lives: 4, inv: [], port: "👤", portIdx: 0, customImg: null },
            { name: "P2", lives: 4, inv: [], port: "👤", portIdx: 0, customImg: null }
        ]
    };

    const portraits = ["👤", "💀", "👺", "🤡", "🤖", "🤠", "👽", "👹"];

    window.addEventListener('mousemove', (e) => {
        if (!state.canShoot) return;
        const gunContainer = document.getElementById('gun-system');
        const rect = gunContainer.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        state.gunFacing = e.clientX < centerX ? 1 : -1;
        updateGunTransform();
    });

    function updateGunTransform(extraTransform = "") {
        const gunEmoji = document.getElementById('gun-emoji');
        gunEmoji.style.transform = `scaleX(${state.gunFacing}) ${extraTransform}`;
    }

    function cyclePortLobby(p) {
        state.players[p].customImg = null; 
        state.players[p].portIdx = (state.players[p].portIdx + 1) % portraits.length;
        state.players[p].port = portraits[state.players[p].portIdx];
        const display = document.getElementById(`p${p}-portrait-display`);
        display.style.backgroundImage = 'none';
        display.innerText = state.players[p].port;
    }

    function handleImageUpload(pIdx, event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                state.players[pIdx].customImg = e.target.result;
                const display = document.getElementById(`p${pIdx}-portrait-display`);
                display.innerText = '';
                display.style.backgroundImage = `url(${e.target.result})`;
            };
            reader.readAsDataURL(file);
        }
    }

    function startGame() {
        for (let i = 0; i < 2; i++) {
            state.players[i].name = document.getElementById(`p${i}-name-in`).value.toUpperCase() || `P${i+1}`;
            document.getElementById(`p${i}-name-tag`).innerText = state.players[i].name;
            const portEl = document.getElementById(`p${i}-portrait`);
            if (state.players[i].customImg) {
                portEl.innerText = '';
                portEl.style.backgroundImage = `url(${state.players[i].customImg})`;
            } else {
                portEl.innerText = state.players[i].port;
            }
        }
        document.getElementById('main-menu').style.display = 'none';
        initChamber();
        drawLighting();
    }

    function initChamber() {
        state.chamber = ['LIVE', 'LIVE', 'BLANK', 'BLANK', 'BLANK', 'FIRE'].sort(() => Math.random() - 0.5);
        state.chamberIdx = 0;
        updateUI();
    }

    function handleShoot(targetIdx) {
        if (!state.canShoot) return;
        state.canShoot = false;
        
        const bullet = state.chamber[state.chamberIdx];
        const gunContainer = document.getElementById('gun-system');
        
        gunContainer.classList.add('prep-shaking');

        setTimeout(() => {
            gunContainer.classList.remove('prep-shaking');
            // Recoil
            updateGunTransform(`translateX(${state.gunFacing * 30}px)`);
            setTimeout(() => updateGunTransform(), 150);

            resolveShot(bullet, targetIdx);
        }, 500);
    }

    function resolveShot(type, targetIdx) {
        let dmg = (type === 'LIVE') ? 1 : (type === 'FIRE' ? 2 : 0);
        
        const flash = document.getElementById('room-flash');
        flash.style.background = dmg > 0 ? 'red' : 'cyan';
        flash.style.opacity = '0.4';
        setTimeout(() => flash.style.opacity = '0', 200);

        if (dmg > 0) {
            state.players[targetIdx].lives = Math.max(0, state.players[targetIdx].lives - dmg);
            showToast(`${state.players[targetIdx].name} HIT!`, 1500);
        } else {
            showToast("CLICK. SAFE.", 1500);
        }

        state.chamberIdx++;
        updateUI();

        if (state.players[targetIdx].lives <= 0) {
            document.getElementById(`p${targetIdx}-card`).classList.add('dead-tumble');
            setTimeout(endMatch, 1500);
            return;
        }

        setTimeout(() => {
            if (state.chamberIdx >= 6) nextRound();
            else {
                state.turn = 1 - state.turn;
                state.canShoot = true;
                updateUI();
            }
        }, 1000);
    }

    function updateUI() {
        state.players.forEach((p, i) => {
            // FIXED HEALTH COUNTER: Shows exactly the number of hearts as lives
            let hearts = "";
            for(let h=0; h<p.lives; h++) {
                hearts += '<span class="heart" style="color: var(--live-red);">❤</span>';
            }
            document.getElementById(`p${i}-lives`).innerHTML = hearts || "💀";
            
            document.getElementById(`p${i}-card`).className = `player-card ${state.turn === i ? 'active' : 'inactive'}`;
            
            const slots = document.querySelectorAll(`#p${i}-inv .inv-slot`);
            slots.forEach((s, idx) => {
                const item = p.inv[idx];
                s.innerText = item ? item.icon : "";
                s.disabled = (state.turn !== i || !state.canShoot);
            });
        });

        document.getElementById('match-info').innerText = `ROUND ${state.currentRound} / ${state.maxRounds}`;
        document.getElementById('chamber-count').innerText = `${6 - state.chamberIdx}/6`;
        
        const gunContainer = document.getElementById('gun-system');
        gunContainer.style.left = (state.turn === 0) ? "42%" : "58%";
        updateGunTransform();
    }

    function nextRound() {
        state.currentRound++;
        const rt = document.getElementById('round-transition');
        rt.style.transform = 'translateY(0)';
        let c = 3;
        const t = setInterval(() => {
            document.getElementById('rt-countdown').innerText = --c;
            if(c<=0) {
                clearInterval(t);
                rt.style.transform = 'translateY(-100%)';
                state.players.forEach(p => { if(p.inv.length < 3) p.inv.push(ITEMS[Math.floor(Math.random()*ITEMS.length)]); });
                initChamber();
                state.canShoot = true;
            }
        }, 800);
    }

    function showToast(m, d) {
        const t = document.getElementById('toast');
        t.innerText = m; t.style.opacity = 1;
        setTimeout(() => t.style.opacity = 0, d);
    }

    function endMatch() {
        document.getElementById('end-screen').style.display = 'flex';
        const winner = state.players[0].lives > 0 ? state.players[0].name : state.players[1].name;
        document.getElementById('winner-text').innerText = `${winner} SURVIVED`;
    }

    function rematch() {
        state.players.forEach(p => { p.lives = 4; p.inv = []; });
        state.currentRound = 1;
        document.querySelectorAll('.player-card').forEach(c => c.classList.remove('dead-tumble'));
        document.getElementById('end-screen').style.display = 'none';
        initChamber();
    }

    // LIGHTING SYSTEM: Changed to "Multiply" style darkness
    const canvas = document.getElementById('lighting-overlay');
    const ctx = canvas.getContext('2d');

    function drawLighting() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        const pendulum = document.getElementById('pendulum-container').getBoundingClientRect();
        const lx = pendulum.left + pendulum.width / 2;
        const ly = pendulum.top + pendulum.height;

        // Fill with base darkness
        ctx.fillStyle = "rgba(15, 15, 20, 0.95)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Cut out the light (Destination-Out creates the "Inverse" multiply effect)
        ctx.globalCompositeOperation = 'destination-out';
        const grad = ctx.createRadialGradient(lx, ly, 20, lx, ly, 450);
        grad.addColorStop(0, 'rgba(255, 255, 255, 1)');
        grad.addColorStop(1, 'rgba(255, 255, 255, 0)');
        
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(lx, ly, 450, 0, Math.PI * 2);
        ctx.fill();

        // Reset to draw soft shadows
        ctx.globalCompositeOperation = 'source-over';
        ctx.fillStyle = "rgba(0,0,0,0.4)";
        document.querySelectorAll('.player-card').forEach(card => {
            const r = card.getBoundingClientRect();
            const corners = [{x:r.left,y:r.top},{x:r.right,y:r.top},{x:r.right,y:r.bottom},{x:r.left,y:r.bottom}];
            corners.forEach((c, i) => {
                const n = corners[(i+1)%4];
                const e1 = { x: c.x + (c.x - lx) * 2, y: c.y + (c.y - ly) * 2 };
                const e2 = { x: n.x + (n.x - lx) * 2, y: n.y + (n.y - ly) * 2 };
                ctx.beginPath();
                ctx.moveTo(c.x, c.y); ctx.lineTo(n.x, n.y);
                ctx.lineTo(e2.x, e2.y); ctx.lineTo(e1.x, e1.y);
                ctx.fill();
            });
        });

        requestAnimationFrame(drawLighting);
    }
</script>

</body>
</html>
