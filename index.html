<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rogue Roulette - Tactical Duel</title>
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --panel-bg: rgba(25, 25, 25, 0.95);
            --accent-yellow: #ffcc00;
            --live-red: #ff3333;
            --blank-blue: #33aaff;
            --fire-orange: #ff7700;
            --heal-green: #33ff33;
            --poison-purple: #a033ff;
            --text-dim: #999;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            color: #eee;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 100vw; height: 100vh;
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), 
                              url('https://static.vecteezy.com/system/resources/thumbnails/007/995/476/small/brick-wall-background-seamless-texture-pattern-illustration-free-vector.jpg');
            background-repeat: repeat;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
        }

        /* Pendulum Light */
        #pendulum-container {
            position: absolute; top: 0; left: 50%;
            width: 2px; height: 150px;
            background: #333;
            transform-origin: top center;
            animation: swing 4s ease-in-out infinite;
            z-index: 6;
        }
        #light-bulb {
            position: absolute; bottom: -20px; left: -10px;
            width: 20px; height: 20px;
            background: #fff; border-radius: 50%;
            box-shadow: 0 0 50px 20px rgba(255, 255, 255, 0.2);
        }
        @keyframes swing {
            0%, 100% { transform: rotate(15deg); }
            50% { transform: rotate(-15deg); }
        }

        #lighting-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 5;
        }

        /* Screens */
        .screen {
            position: fixed; inset: 0; background: var(--bg-dark);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100;
        }
        #main-menu { background: #111; }
        .lobby-row { display: flex; gap: 50px; margin-bottom: 30px; }
        .lobby-card { background: #222; padding: 20px; border: 1px solid #444; text-align: center; width: 250px; }
        input { background: #000; color: var(--accent-yellow); border: 1px solid #555; padding: 5px; text-align: center; margin-bottom: 10px; width: 80%; }
        button { cursor: pointer; padding: 10px 20px; background: #333; color: white; border: none; font-family: inherit; }
        button:hover { background: var(--accent-yellow); color: black; }

        /* Arena */
        #arena {
            position: relative; width: 100%; flex-grow: 1;
            display: flex; justify-content: space-around; align-items: center;
            z-index: 10; padding-top: 100px;
        }

        .player-card {
            width: 240px; padding: 20px;
            background: var(--panel-bg);
            border: 2px solid #333; border-radius: 8px;
            text-align: center; transition: all 0.3s ease;
        }
        .player-card.active { border-color: var(--accent-yellow); box-shadow: 0 0 30px rgba(255, 204, 0, 0.2); }
        .player-card.inactive { opacity: 0.5; pointer-events: none; }

        .portrait {
            width: 130px; height: 130px; margin: 0 auto 15px;
            background: #1a1a1a; border: 4px solid #333;
            display: flex; align-items: center; justify-content: center;
            font-size: 5rem; cursor: crosshair;
        }
        .portrait:hover { border-color: var(--live-red); }

        /* Gun Graphics */
        #gun-system {
            position: absolute; top: 55%; left: 50%;
            width: 140px; height: 80px;
            transform: translate(-50%, -50%);
            pointer-events: none; z-index: 15;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .gun-image {
            width: 100%; height: auto;
            filter: drop-shadow(0 0 5px black);
        }

        /* Feedback */
        #toast {
            position: absolute; top: 120px; left: 50%; transform: translateX(-50%);
            padding: 15px 30px; background: rgba(0,0,0,0.9); border: 1px solid var(--accent-yellow);
            color: var(--accent-yellow); border-radius: 5px; opacity: 0; transition: opacity 0.5s; z-index: 200;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            40% { transform: translate(3px, 2px) rotate(-1deg); }
            60% { transform: translate(-1px, -1px) rotate(1deg); }
            80% { transform: translate(-3px, 1px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .shaking { animation: shake 0.4s infinite; }

        @keyframes shuffle-anim {
            0% { transform: translate(-50%, -50%) rotate(0deg) scale(1); opacity: 1; }
            50% { transform: translate(-50%, -50%) rotate(360deg) scale(1.5); opacity: 0.5; }
            100% { transform: translate(-50%, -50%) rotate(720deg) scale(1); opacity: 1; }
        }
        .shuffling { animation: shuffle-anim 0.8s ease-in-out; }

        .ammo-dot { font-size: 2rem; margin: 0 5px; color: #444; transition: color 0.5s; }
    </style>
</head>
<body>

<div id="main-menu" class="screen">
    <h1 style="color: var(--accent-yellow); font-size: 3rem; letter-spacing: 10px;">ROGUE ROULETTE</h1>
    <div class="lobby-row">
        <div class="lobby-card">
            <h3>PLAYER 1</h3>
            <input type="text" id="p0-name-in" value="PLAYER 1">
            <div id="p0-portrait-display" style="font-size: 4rem; margin: 10px 0;">👤</div>
            <button onclick="cyclePortLobby(0)">Change Face</button>
        </div>
        <div class="lobby-card">
            <h3>PLAYER 2</h3>
            <input type="text" id="p1-name-in" value="PLAYER 2">
            <div id="p1-portrait-display" style="font-size: 4rem; margin: 10px 0;">👤</div>
            <button onclick="cyclePortLobby(1)">Change Face</button>
        </div>
    </div>
    <button style="font-size: 1.5rem; padding: 15px 50px;" onclick="startGame()">START DUEL</button>
</div>

<div id="game-container">
    <div id="pendulum-container">
        <div id="light-bulb"></div>
    </div>
    <canvas id="lighting-overlay"></canvas>

    <div id="header" style="text-align: center; padding: 20px; z-index: 10;">
        <div id="match-info" style="font-size: 1.5rem; color: var(--accent-yellow);">ROUND 1 / 5</div>
        <div id="ammo-display"></div>
    </div>

    <div id="toast">Message here</div>

    <div id="arena">
        <div id="p0-card" class="player-card active">
            <div class="name-tag" id="p0-name-tag">PLAYER 1</div>
            <div id="p0-tier" style="font-size: 0.7rem; margin-bottom: 10px; color: #666;">ROOKIE</div>
            <div class="portrait" id="p0-portrait" onclick="handleShoot(0)">👤</div>
            <div class="stats">
                LIVES: <span id="p0-lives" style="color: var(--live-red);">❤❤❤❤</span><br>
                EXP: <span id="p0-exp">0</span>
            </div>
            <div class="inventory" style="display: flex; justify-content: center; gap: 5px; margin-top: 10px;">
                <button class="inv-slot" onclick="useItem(0, 0)" style="width:40px; height:40px;"></button>
                <button class="inv-slot" onclick="useItem(0, 1)" style="width:40px; height:40px;"></button>
                <button class="inv-slot" onclick="useItem(0, 2)" style="width:40px; height:40px;"></button>
            </div>
            <div id="p0-status" style="height: 20px; font-size: 0.8rem; margin-top: 5px;"></div>
        </div>

        <div id="gun-system">
            <img src="https://www.transparentpng.com/download/gun/revolver-pistol-gun-transparent-free-S03ecl.png" class="gun-image" id="gun-img">
        </div>

        <div id="p1-card" class="player-card">
            <div class="name-tag" id="p1-name-tag">PLAYER 2</div>
            <div id="p1-tier" style="font-size: 0.7rem; margin-bottom: 10px; color: #666;">ROOKIE</div>
            <div class="portrait" id="p1-portrait" onclick="handleShoot(1)">👤</div>
            <div class="stats">
                LIVES: <span id="p1-lives" style="color: var(--live-red);">❤❤❤❤</span><br>
                EXP: <span id="p1-exp">0</span>
            </div>
            <div class="inventory" style="display: flex; justify-content: center; gap: 5px; margin-top: 10px;">
                <button class="inv-slot" onclick="useItem(1, 0)" style="width:40px; height:40px;"></button>
                <button class="inv-slot" onclick="useItem(1, 1)" style="width:40px; height:40px;"></button>
                <button class="inv-slot" onclick="useItem(1, 2)" style="width:40px; height:40px;"></button>
            </div>
            <div id="p1-status" style="height: 20px; font-size: 0.8rem; margin-top: 5px;"></div>
        </div>
    </div>

    <div id="footer" style="padding: 20px; z-index: 10;">
        <span style="color: #444;">CHAMBER: <span id="chamber-count" style="color: #999;">6/6</span></span>
    </div>
</div>

<div id="end-screen" class="screen" style="display: none;">
    <h1 id="winner-text" style="color: var(--accent-yellow);">MATCH OVER</h1>
    <button onclick="location.reload()">REMATCH</button>
</div>

<script>
    const ROUND_TYPES = { LIVE: 'LIVE', BLANK: 'BLANK', FIRE: 'FIRE' };
    const BULLET_COLORS = { LIVE: 'var(--live-red)', BLANK: 'var(--blank-blue)', FIRE: 'var(--fire-orange)' };
    const ITEMS = [
        { name: 'Medkit', icon: '💉', effect: 'heal' },
        { name: 'Handcuffs', icon: '⛓️', effect: 'skip' },
        { name: 'Magnifier', icon: '🔍', effect: 'inspect' },
        { name: 'Dice', icon: '🎲', effect: 'shuffle' },
        { name: 'Chronos', icon: '⏳', effect: 'extend' }
    ];

    let state = {
        turn: 0,
        chamber: [],
        chamberIdx: 0,
        currentRound: 1,
        maxRounds: 5,
        canShoot: true,
        bonusShot: false,
        isSkipped: false,
        revealedIdx: -1,
        players: [
            { name: "P1", lives: 4, exp: 0, inv: [], port: "👤", portIdx: 0 },
            { name: "P2", lives: 4, exp: 0, inv: [], port: "👤", portIdx: 0 }
        ]
    };

    const portraits = ["👤", "💀", "👺", "🤡", "🤖", "🤠", "👽", "👹"];

    function cyclePortLobby(p) {
        state.players[p].portIdx = (state.players[p].portIdx + 1) % portraits.length;
        state.players[p].port = portraits[state.players[p].portIdx];
        document.getElementById(`p${p}-portrait-display`).innerText = state.players[p].port;
    }

    function startGame() {
        state.players[0].name = document.getElementById('p0-name-in').value.toUpperCase() || "PLAYER 1";
        state.players[1].name = document.getElementById('p1-name-in').value.toUpperCase() || "PLAYER 2";
        
        document.getElementById('p0-name-tag').innerText = state.players[0].name;
        document.getElementById('p1-name-tag').innerText = state.players[1].name;
        document.getElementById('p0-portrait').innerText = state.players[0].port;
        document.getElementById('p1-portrait').innerText = state.players[1].port;
        
        document.getElementById('main-menu').style.display = 'none';
        initChamber();
        drawShadows();
    }

    function initChamber() {
        let pool = ['LIVE', 'LIVE', 'BLANK', 'BLANK', 'BLANK', 'FIRE'];
        state.chamber = pool.sort(() => Math.random() - 0.5);
        state.chamberIdx = 0;
        state.revealedIdx = -1;
        updateUI();
    }

    function handleShoot(targetIdx) {
        if (!state.canShoot) return;
        
        const isSelf = (targetIdx === state.turn);
        const bullet = state.chamber[state.chamberIdx];
        state.canShoot = false;
        
        state.revealedIdx = -1; // Reset revelation
        triggerFireAnim(targetIdx, bullet);

        setTimeout(() => {
            resolveShot(bullet, targetIdx, isSelf);
        }, 600);
    }

    function triggerFireAnim(targetIdx, bullet) {
        const gun = document.getElementById('gun-system');
        const recoil = (state.turn === 0) ? -40 : 40;
        gun.style.transform += ` translateX(${recoil}px) scale(1.2)`;
        
        if (bullet !== 'BLANK') {
            document.getElementById(`p${targetIdx}-card`).classList.add('shaking');
        }

        setTimeout(() => {
            gun.style.transform = gun.style.transform.replace(/ translateX\(.*\)/, '').replace(' scale(1.2)', '');
            document.getElementById(`p${targetIdx}-card`).classList.remove('shaking');
        }, 400);
    }

    function resolveShot(type, targetIdx, isSelf) {
        let dmg = 0;
        if (type === 'LIVE') dmg = 1;
        if (type === 'FIRE') dmg = 2;

        if (dmg > 0) {
            state.players[targetIdx].lives -= dmg;
            state.players[targetIdx].exp = Math.max(0, state.players[targetIdx].exp - 10);
            showToast(`${state.players[targetIdx].name} WAS HIT!`, 5000);
        } else {
            showToast("...CLICK. SAFE.", 5000);
            if (isSelf) {
                state.players[state.turn].exp += 15;
                if (!state.bonusShot) {
                    state.bonusShot = true;
                    showStatus(state.turn, "BONUS SHOT", "var(--accent-yellow)");
                    state.chamberIdx++;
                    state.canShoot = true;
                    updateUI();
                    return;
                }
            }
        }

        state.chamberIdx++;
        state.bonusShot = false;

        if (state.players[0].lives <= 0 || state.players[1].lives <= 0) {
            endMatch();
            return;
        }

        if (state.chamberIdx >= 6) {
            nextRound();
        } else {
            passTurn();
        }
        updateUI();
    }

    function passTurn() {
        let next = 1 - state.turn;
        if (state.isSkipped) {
            state.isSkipped = false;
            showToast(`${state.players[next].name} IS HANDCUFFED.`, 4000);
        } else {
            state.turn = next;
        }
        state.canShoot = true;
    }

    function nextRound() {
        state.currentRound++;
        if (state.currentRound > state.maxRounds) {
            endMatch();
            return;
        }
        awardItems();
        initChamber();
        state.turn = 0;
        state.canShoot = true;
    }

    function awardItems() {
        state.players.forEach(p => {
            if (p.inv.length < 3 && Math.random() > 0.3) {
                p.inv.push(ITEMS[Math.floor(Math.random() * ITEMS.length)]);
            }
        });
    }

    function useItem(pIdx, slot) {
        if (state.turn !== pIdx || !state.canShoot) return;
        const item = state.players[pIdx].inv[slot];
        if (!item) return;

        state.players[pIdx].inv.splice(slot, 1);
        
        switch(item.effect) {
            case 'heal':
                if (state.players[pIdx].lives >= 4) {
                    state.players[pIdx].lives--;
                    showStatus(pIdx, "OVERDOSE! POISONED", "var(--poison-purple)");
                } else {
                    state.players[pIdx].lives++;
                    showStatus(pIdx, "STABILIZED", "var(--heal-green)");
                }
                break;
            case 'skip':
                state.isSkipped = true;
                showToast("NEXT TURN SKIPPED", 4000);
                break;
            case 'inspect':
                state.revealedIdx = state.chamberIdx;
                showToast(`NEXT ROUND IS ${state.chamber[state.chamberIdx]}`, 5000);
                break;
            case 'shuffle':
                document.getElementById('gun-system').classList.add('shuffling');
                setTimeout(() => {
                    let rem = state.chamber.slice(state.chamberIdx).sort(() => Math.random() - 0.5);
                    state.chamber.splice(state.chamberIdx, rem.length, ...rem);
                    document.getElementById('gun-system').classList.remove('shuffling');
                    updateUI();
                }, 800);
                break;
            case 'extend':
                state.maxRounds++;
                break;
        }
        updateUI();
    }

    function updateUI() {
        state.players.forEach((p, i) => {
            document.getElementById(`p${i}-lives`).innerText = p.lives > 0 ? "❤".repeat(p.lives) : "💀";
            document.getElementById(`p${i}-exp`).innerText = p.exp;
            document.getElementById(`p${i}-card`).className = `player-card ${state.turn === i ? 'active' : 'inactive'}`;
            const slots = document.querySelectorAll(`#p${i}-card .inv-slot`);
            slots.forEach((s, idx) => s.innerText = p.inv[idx] ? p.inv[idx].icon : "");
        });

        document.getElementById('match-info').innerText = `ROUND ${state.currentRound} / ${state.maxRounds}`;
        document.getElementById('chamber-count').innerText = `${6 - state.chamberIdx}/6`;
        
        // Chamber dots
        let dots = "";
        for(let i=0; i<6; i++) {
            let color = "#444";
            if (i < state.chamberIdx) color = "#111"; // fired
            else if (i === state.revealedIdx) color = BULLET_COLORS[state.chamber[i]]; // revealed
            dots += `<span class="ammo-dot" style="color: ${color}">●</span>`;
        }
        document.getElementById('ammo-display').innerHTML = dots;

        // Gun Flip
        const gun = document.getElementById('gun-system');
        gun.style.left = (state.turn === 0) ? "45%" : "55%";
        document.getElementById('gun-img').style.transform = (state.turn === 0) ? "scaleX(1)" : "scaleX(-1)";
    }

    function showToast(msg, dur) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.opacity = 1;
        setTimeout(() => t.style.opacity = 0, dur);
    }

    function showStatus(p, msg, col) {
        const s = document.getElementById(`p${p}-status`);
        s.innerText = msg;
        s.style.color = col;
        setTimeout(() => s.innerText = "", 3000);
    }

    function endMatch() {
        document.getElementById('end-screen').style.display = 'flex';
        let win = state.players[0].lives > state.players[1].lives ? state.players[0].name : state.players[1].name;
        if (state.players[0].lives === state.players[1].lives) win = "DRAW";
        document.getElementById('winner-text').innerText = `${win} SURVIVED`;
    }

    // Shadow Rendering
    const canvas = document.getElementById('lighting-overlay');
    const ctx = canvas.getContext('2d');
    function drawShadows() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.clearRect(0,0,canvas.width, canvas.height);
        
        // Pendulum Light Position
        const pendulum = document.getElementById('pendulum-container').getBoundingClientRect();
        const lightX = pendulum.left + pendulum.width/2;
        const lightY = pendulum.top + pendulum.height;

        document.querySelectorAll('.player-card').forEach(card => {
            const r = card.getBoundingClientRect();
            const corners = [{x:r.left,y:r.top},{x:r.right,y:r.top},{x:r.right,y:r.bottom},{x:r.left,y:r.bottom}];
            ctx.fillStyle = "rgba(0,0,0,0.6)";
            corners.forEach((c, i) => {
                const n = corners[(i+1)%4];
                const e1 = { x: c.x+(c.x-lightX)*5, y: c.y+(c.y-lightY)*5 };
                const e2 = { x: n.x+(n.x-lightX)*5, y: n.y+(n.y-lightY)*5 };
                ctx.beginPath();
                ctx.moveTo(c.x, c.y); ctx.lineTo(n.x, n.y);
                ctx.lineTo(e2.x, e2.y); ctx.lineTo(e1.x, e1.y);
                ctx.fill();
            });
        });
        requestAnimationFrame(drawShadows);
    }
</script>

</body>
</html>
