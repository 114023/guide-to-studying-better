<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rogue Roulette</title>
    <style>
        :root {
            --bg-dark: #050505;
            --panel-bg: rgba(15, 15, 15, 0.9);
            --accent-yellow: #d4af37; /* Burnished Gold */
            --live-red: #880000;
            --blank-blue: #114466;
            --fire-orange: #aa4400;
            --text-dim: #666;
            --rust: #3d2b1f;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-dark);
            color: #ccc;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 100vw; height: 100vh;
            background: 
                radial-gradient(circle at 50% 30%, rgba(0,0,0,0) 0%, rgba(0,0,0,0.9) 80%),
                linear-gradient(var(--bg-dark), var(--rust)),
                url('https://static.vecteezy.com/system/resources/thumbnails/007/995/476/small/brick-wall-background-seamless-texture-pattern-illustration-free-vector.jpg');
            background-blend-mode: multiply;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
        }

        /* Hanging Wire Light */
        #pendulum-container {
            position: absolute; top: 0; left: 50%;
            width: 2px; height: 280px;
            background: #222;
            transform-origin: top center;
            animation: swing 6s ease-in-out infinite, flicker 10s infinite;
            z-index: 6;
        }
        #light-bulb {
            position: absolute; bottom: -15px; left: -10px;
            width: 20px; height: 25px;
            background: #fffbe6; border-radius: 40% 40% 50% 50%;
            box-shadow: 0 0 80px 30px rgba(255, 255, 200, 0.15);
        }

        @keyframes flicker {
            0%, 90%, 100% { opacity: 1; }
            92% { opacity: 0.5; }
            93% { opacity: 1; }
            94% { opacity: 0.2; }
            95% { opacity: 1; }
        }

        @keyframes swing {
            0%, 100% { transform: rotate(8deg); }
            50% { transform: rotate(-8deg); }
        }

        /* UI Screens */
        .screen {
            position: fixed; inset: 0; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000;
        }

        .player-card {
            width: 240px; padding: 25px;
            background: var(--panel-bg);
            border: 1px solid #222; border-radius: 2px;
            text-align: center; position: relative;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .player-card.active { 
            border-color: var(--accent-yellow); 
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.1);
            animation: pulse-border 2s infinite;
        }

        @keyframes pulse-border {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .portrait {
            width: 140px; height: 140px; margin: 0 auto 15px;
            filter: grayscale(100%) contrast(1.2) brightness(0.7);
            border: 1px solid #333; transition: filter 0.3s;
            background-size: cover; background-position: center;
            display: flex; align-items: center; justify-content: center; font-size: 4rem;
        }
        .active .portrait { filter: grayscale(30%) brightness(0.9); }

        /* Custom Watergun Graphic */
        #gun-system {
            position: absolute; top: 55%; left: 50%;
            width: 120px; height: 60px;
            transform: translate(-50%, -50%);
            z-index: 50; pointer-events: none;
            transition: left 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        .gun-visual {
            width: 100%; height: 100%;
            background: #222;
            border-radius: 5px;
            position: relative;
            border: 2px solid #111;
        }
        .gun-barrel {
            position: absolute; right: -20px; top: 10px;
            width: 40px; height: 15px; background: #1a1a1a;
            border: 2px solid #000;
        }
        .gun-tank {
            position: absolute; top: -15px; left: 10px;
            width: 70px; height: 25px; background: rgba(50, 150, 255, 0.3);
            border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);
        }
        
        .recoil { animation: recoil-anim 0.2s ease-out; }
        @keyframes recoil-anim {
            0% { transform: translateX(0); }
            50% { transform: translateX(-20px); }
            100% { transform: translateX(0); }
        }

        /* Heart Animation */
        .heart {
            display: inline-block;
            transition: all 0.8s ease;
            color: var(--live-red);
            margin: 0 2px;
        }
        .heart.lost {
            transform: translateY(20px) scale(0) rotate(45deg);
            opacity: 0;
            filter: blur(5px);
        }

        /* Gritty Buttons */
        button {
            background: #1a1a1a; color: #777; border: 1px solid #333;
            padding: 10px 20px; font-family: 'Courier New', monospace;
            text-transform: uppercase; letter-spacing: 2px; cursor: pointer;
        }
        button:hover { background: #222; color: var(--accent-yellow); border-color: var(--accent-yellow); }

        #toast {
            position: fixed; top: 20%; left: 50%; transform: translate(-50%, -50%);
            color: var(--accent-yellow); font-size: 1.2rem; text-shadow: 0 0 10px #000;
            opacity: 0; transition: opacity 0.4s; z-index: 100;
        }
    </style>
</head>
<body>

<div id="main-menu" class="screen">
    <h1 style="letter-spacing: 15px; color: #444;">ROGUE ROULETTE</h1>
    <div style="display:flex; gap: 40px; margin: 40px;">
        <div class="lobby-card" style="text-align:center">
            <input type="text" id="p0-name-in" value="DUELIST 1" style="background:none; border:none; border-bottom: 1px solid #333; color: #fff; text-align:center; margin-bottom:10px;">
            <div id="p0-port-pre" class="portrait">👤</div>
            <button onclick="cyclePort(0)">TYPE</button>
        </div>
        <div class="lobby-card" style="text-align:center">
            <input type="text" id="p1-name-in" value="DUELIST 2" style="background:none; border:none; border-bottom: 1px solid #333; color: #fff; text-align:center; margin-bottom:10px;">
            <div id="p1-port-pre" class="portrait">👤</div>
            <button onclick="cyclePort(1)">TYPE</button>
        </div>
    </div>
    <button onclick="startGame()" style="font-size: 1.5rem; padding: 20px 60px;">ENTER ENCLOSURE</button>
</div>

<div id="game-container">
    <div id="pendulum-container"><div id="light-bulb"></div></div>
    
    <div id="toast">CHAMBER LOADED</div>

    <div id="header" style="margin-top: 50px; text-align:center; z-index: 10;">
        <div id="round-txt" style="color: var(--text-dim); font-size: 0.8rem;">MATCH 1 / 5</div>
        <div id="ammo-slots" style="font-size: 1.5rem; letter-spacing: 5px;"></div>
    </div>

    <div id="arena" style="width: 100%; display: flex; justify-content: space-around; align-items: center; flex-grow: 1;">
        <div id="p0-card" class="player-card active">
            <div id="p0-name" style="margin-bottom: 15px; font-weight: bold;">PLAYER 1</div>
            <div class="portrait" id="p0-portrait" onclick="shoot(0)">👤</div>
            <div id="p0-lives-container"></div>
            <div class="inventory" id="p0-inv" style="margin-top:15px; display:flex; justify-content:center; gap:5px;">
                <div style="width:30px; height:30px; border:1px solid #222;"></div>
                <div style="width:30px; height:30px; border:1px solid #222;"></div>
                <div style="width:30px; height:30px; border:1px solid #222;"></div>
            </div>
        </div>

        <div id="gun-system">
            <div id="gun-graphic" class="gun-visual">
                <div class="gun-tank"></div>
                <div class="gun-barrel"></div>
            </div>
        </div>

        <div id="p1-card" class="player-card">
            <div id="p1-name" style="margin-bottom: 15px; font-weight: bold;">PLAYER 2</div>
            <div class="portrait" id="p1-portrait" onclick="shoot(1)">👤</div>
            <div id="p1-lives-container"></div>
            <div class="inventory" id="p1-inv" style="margin-top:15px; display:flex; justify-content:center; gap:5px;">
                <div style="width:30px; height:30px; border:1px solid #222;"></div>
                <div style="width:30px; height:30px; border:1px solid #222;"></div>
                <div style="width:30px; height:30px; border:1px solid #222;"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const portraits = ["👤", "💀", "👺", "🤡", "🤖", "🤠", "👽", "👹"];
    let state = {
        turn: 0,
        currentRound: 1,
        chamber: [],
        chamberIdx: 0,
        busy: false,
        players: [
            { name: "P1", lives: 4, portIdx: 0 },
            { name: "P2", lives: 4, portIdx: 0 }
        ]
    };

    function cyclePort(p) {
        state.players[p].portIdx = (state.players[p].portIdx + 1) % portraits.length;
        document.getElementById(`p${p}-port-pre`).innerText = portraits[state.players[p].portIdx];
    }

    function startGame() {
        state.players[0].name = document.getElementById('p0-name-in').value.toUpperCase();
        state.players[1].name = document.getElementById('p1-name-in').value.toUpperCase();
        
        document.getElementById('p0-name').innerText = state.players[0].name;
        document.getElementById('p1-name').innerText = state.players[1].name;
        document.getElementById('p0-portrait').innerText = portraits[state.players[0].portIdx];
        document.getElementById('p1-portrait').innerText = portraits[state.players[1].portIdx];
        
        document.getElementById('main-menu').style.display = 'none';
        loadChamber();
    }

    function loadChamber() {
        state.chamber = ['LIVE', 'LIVE', 'BLANK', 'BLANK', 'BLANK', 'FIRE'].sort(() => Math.random() - 0.5);
        state.chamberIdx = 0;
        updateUI();
        showToast("CHAMBER RE-LOADED");
    }

    function updateUI() {
        state.players.forEach((p, i) => {
            const container = document.getElementById(`p${i}-lives-container`);
            // Update hearts without destroying all elements to keep animations
            const currentHeartCount = container.querySelectorAll('.heart:not(.lost)').length;
            if (currentHeartCount !== p.lives) {
                container.innerHTML = '';
                for(let l=0; l<4; l++) {
                    const span = document.createElement('span');
                    span.className = 'heart' + (l >= p.lives ? ' lost' : '');
                    span.innerText = '❤';
                    container.appendChild(span);
                }
            }
            document.getElementById(`p${i}-card`).className = `player-card ${state.turn === i ? 'active' : ''}`;
        });

        // Gun Orientation
        const gun = document.getElementById('gun-system');
        const graphic = document.getElementById('gun-graphic');
        gun.style.left = state.turn === 0 ? '45%' : '55%';
        graphic.style.transform = state.turn === 0 ? 'scaleX(1)' : 'scaleX(-1)';

        // Ammo display
        let ammoHtml = "";
        for(let i=0; i<6; i++) {
            let color = i < state.chamberIdx ? "#111" : "#333";
            ammoHtml += `<span style="color: ${color}">●</span>`;
        }
        document.getElementById('ammo-slots').innerHTML = ammoHtml;
        document.getElementById('round-txt').innerText = `ROUND ${state.currentRound} / 5`;
    }

    function shoot(target) {
        if (state.busy) return;
        state.busy = true;

        const bullet = state.chamber[state.chamberIdx];
        const gunGraphic = document.getElementById('gun-graphic');
        gunGraphic.classList.add('recoil');
        
        setTimeout(() => {
            gunGraphic.classList.remove('recoil');
            if (bullet === 'LIVE' || bullet === 'FIRE') {
                const dmg = bullet === 'FIRE' ? 2 : 1;
                state.players[target].lives = Math.max(0, state.players[target].lives - dmg);
                showToast(`${state.players[target].name} STRUCK`);
                state.turn = 1 - state.turn; // Switch turn on hit
            } else {
                showToast("CLICK...");
                if (target !== state.turn) state.turn = 1 - state.turn; // Only switch if they shot opponent
            }

            state.chamberIdx++;
            updateUI();

            setTimeout(() => {
                state.busy = false;
                if (state.players[0].lives <= 0 || state.players[1].lives <= 0) {
                    alert("DUEL ENDED");
                    location.reload();
                } else if (state.chamberIdx >= 6) {
                    state.currentRound++;
                    loadChamber();
                }
            }, 1000);
        }, 300);
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.opacity = 1;
        setTimeout(() => t.style.opacity = 0, 1500);
    }
</script>

</body>
</html>
