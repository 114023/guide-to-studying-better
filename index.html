<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rogue Roulette</title>
    <style>
        :root {
            --bg-dark: #050505;
            --panel-bg: rgba(15, 15, 15, 0.9);
            --accent-yellow: #c2a000;
            --live-red: #880000;
            --blank-blue: #004488;
            --fire-orange: #aa4400;
            --heal-green: #115511;
            --poison-purple: #440066;
            --text-dim: #666;
            --rust: #3d2b1f;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-dark);
            color: #bbb;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            user-select: none;
        }

        /* Darker, Dingier Background */
        #game-container {
            position: relative;
            width: 100vw; height: 100vh;
            background: 
                radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.8) 100%),
                linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)), 
                url('https://www.transparenttextures.com/patterns/dark-matter.png'),
                #111;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            box-shadow: inset 0 0 200px #000;
        }

        /* Pendulum Light */
        #pendulum-container {
            position: absolute; top: 0; left: 50%;
            width: 2px; height: 250px;
            background: #222;
            transform-origin: top center;
            animation: swing 6s ease-in-out infinite;
            z-index: 6;
        }
        #light-bulb {
            position: absolute; bottom: -25px; left: -12px;
            width: 24px; height: 24px;
            background: #ffe; border-radius: 50%;
            box-shadow: 0 0 60px 10px rgba(255, 255, 255, 0.1);
            transition: background-color 0.1s, box-shadow 0.1s;
        }
        @keyframes swing {
            0%, 100% { transform: rotate(12deg); }
            50% { transform: rotate(-12deg); }
        }

        #lighting-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 5; opacity: 0.6;
        }

        /* Stats Overlay Slide */
        #stats-overlay {
            position: fixed; top: -100%; left: 0; width: 100%; height: 100%;
            background: rgba(5, 5, 5, 0.98);
            z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: top 0.8s cubic-bezier(0.85, 0, 0.15, 1);
            border-bottom: 5px solid var(--rust);
        }
        #stats-overlay.active { top: 0; }

        /* Screens */
        .screen {
            position: fixed; inset: 0; background: var(--bg-dark);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100;
        }
        #main-menu { background: radial-gradient(#1a1a1a, #000); }

        .lobby-card { 
            background: #0f0f0f; padding: 20px; border: 1px solid #222; 
            text-align: center; width: 250px; border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        button { 
            cursor: pointer; padding: 10px 20px; background: #1a1a1a; 
            color: #888; border: 1px solid #333; font-family: inherit; 
            margin-top: 5px; text-transform: uppercase; letter-spacing: 2px;
        }
        button:hover { background: #222; color: var(--accent-yellow); border-color: var(--accent-yellow); }

        /* Arena */
        .player-card {
            width: 240px; padding: 25px;
            background: var(--panel-bg);
            border: 1px solid #222; border-radius: 2px;
            text-align: center; position: relative;
        }
        .player-card.active { border-color: #444; background: rgba(20,20,20,0.95); }

        .portrait {
            width: 140px; height: 140px; margin: 0 auto 15px;
            background-color: #000; background-size: cover; background-position: center;
            border: 2px solid #222; filter: grayscale(0.5) contrast(1.2);
            display: flex; align-items: center; justify-content: center;
            font-size: 5rem; cursor: crosshair;
        }
        .active .portrait { border-color: #333; filter: grayscale(0); }

        /* Gun Graphics */
        #gun-system {
            position: absolute; top: 55%; left: 50%;
            width: 140px; height: 80px;
            transform: translate(-50%, -50%);
            pointer-events: none; z-index: 15;
            display: flex; align-items: center; justify-content: center;
            transition: left 0.5s ease-in-out;
        }
        .gun-emoji { 
            font-size: 5rem; 
            filter: drop-shadow(0 0 15px rgba(0,0,0,1)); 
            transform-origin: center center;
        }

        /* Shake Effects */
        @keyframes recoil {
            0% { transform: translateX(0); }
            10% { transform: translateX(-40px) rotate(-10deg); }
            100% { transform: translateX(0); }
        }
        .recoil-anim { animation: recoil 0.4s ease-out; }

        @keyframes intense-shake {
            0%, 100% { transform: translate(0,0); }
            25% { transform: translate(2px, -2px); }
            50% { transform: translate(-2px, 2px); }
            75% { transform: translate(2px, 2px); }
        }
        .shaking-heavy { animation: intense-shake 0.1s infinite; }

        /* Life Heart Animation */
        .heart { display: inline-block; transition: all 0.5s ease; color: var(--live-red); margin: 0 2px; }
        .heart-pop { transform: scale(2); opacity: 0; }

        .ammo-dot { font-size: 1.5rem; margin: 0 4px; opacity: 0.3; }

        #toast {
            position: fixed; top: 15%; left: 50%; transform: translateX(-50%);
            padding: 10px 40px; background: #000; border-left: 4px solid var(--accent-yellow);
            color: #fff; z-index: 500; opacity: 0; transition: opacity 0.3s;
            font-size: 0.9rem; text-transform: uppercase; letter-spacing: 3px;
        }
    </style>
</head>
<body>

<div id="stats-overlay">
    <h1 id="stats-round-title" style="color: var(--accent-yellow); font-size: 3rem;">ROUND COMPLETE</h1>
    <div id="stats-content" style="text-align: center; font-size: 1.5rem; line-height: 2;">
        <p>REMAINING LIVES:</p>
        <p id="stats-p0-report"></p>
        <p id="stats-p1-report"></p>
    </div>
    <div style="margin-top: 40px; color: #444;" id="stats-timer">Next round in 6s...</div>
</div>

<div id="main-menu" class="screen">
    <h1 style="color: #444; font-size: 4rem; letter-spacing: 15px; margin-bottom: 5px;">ROGUE ROULETTE</h1>
    <p style="color: #222; margin-bottom: 40px; letter-spacing: 5px;">TACTICAL CASUALTY SIMULATOR</p>
    <div class="lobby-row" style="display: flex; gap: 30px;">
        <div class="lobby-card">
            <input type="text" id="p0-name-in" value="UNIT_01" style="background:#000; border:1px solid #333; color:var(--accent-yellow); text-align:center; padding:5px; width:80%;">
            <div id="p0-portrait-display" class="portrait" style="margin-top:15px;">👤</div>
            <button onclick="cyclePortLobby(0)">Mirror</button>
        </div>
        <div class="lobby-card">
            <input type="text" id="p1-name-in" value="UNIT_02" style="background:#000; border:1px solid #333; color:var(--accent-yellow); text-align:center; padding:5px; width:80%;">
            <div id="p1-portrait-display" class="portrait" style="margin-top:15px;">👤</div>
            <button onclick="cyclePortLobby(1)">Mirror</button>
        </div>
    </div>
    <button style="font-size: 1.5rem; padding: 15px 60px; margin-top: 40px;" onclick="startGame()">ENGAGE</button>
</div>

<div id="game-container">
    <div id="pendulum-container"><div id="light-bulb"></div></div>
    <canvas id="lighting-overlay"></canvas>

    <div id="header" style="text-align: center; padding: 30px; z-index: 10;">
        <div id="match-info" style="font-size: 1.2rem; color: #444; letter-spacing: 4px;">SEC_01 // CHM_06</div>
        <div id="ammo-display"></div>
    </div>

    <div id="toast">SYSTEM MESSAGE</div>

    <div id="arena">
        <div id="p0-card" class="player-card active">
            <div class="name-tag" id="p0-name-tag" style="font-weight: bold; margin-bottom: 10px;">UNIT_01</div>
            <div class="portrait" id="p0-portrait" onclick="handleShoot(0)">👤</div>
            <div id="p0-lives" style="font-size: 1.5rem;"></div>
            <div class="inventory" id="p0-inv" style="display:flex; justify-content:center; gap:5px; margin-top:10px;">
                <button class="inv-slot" onclick="useItem(0, 0)" style="width:35px; height:35px; padding:0;"></button>
                <button class="inv-slot" onclick="useItem(0, 1)" style="width:35px; height:35px; padding:0;"></button>
                <button class="inv-slot" onclick="useItem(0, 2)" style="width:35px; height:35px; padding:0;"></button>
            </div>
            <div id="p0-status" style="height: 20px; font-size: 0.7rem; margin-top: 10px; opacity: 0.6;"></div>
        </div>

        <div id="gun-system">
            <div class="gun-emoji" id="gun-emoji">🔫</div>
        </div>

        <div id="p1-card" class="player-card">
            <div class="name-tag" id="p1-name-tag" style="font-weight: bold; margin-bottom: 10px;">UNIT_02</div>
            <div class="portrait" id="p1-portrait" onclick="handleShoot(1)">👤</div>
            <div id="p1-lives" style="font-size: 1.5rem;"></div>
            <div class="inventory" id="p1-inv" style="display:flex; justify-content:center; gap:5px; margin-top:10px;">
                <button class="inv-slot" onclick="useItem(1, 0)" style="width:35px; height:35px; padding:0;"></button>
                <button class="inv-slot" onclick="useItem(1, 1)" style="width:35px; height:35px; padding:0;"></button>
                <button class="inv-slot" onclick="useItem(1, 2)" style="width:35px; height:35px; padding:0;"></button>
            </div>
            <div id="p1-status" style="height: 20px; font-size: 0.7rem; margin-top: 10px; opacity: 0.6;"></div>
        </div>
    </div>

    <div id="footer" style="padding: 20px; z-index: 10; font-size: 0.8rem; color: #222;">
        STATUS: OPERATIONAL | CHAMBER: <span id="chamber-count">6/6</span>
    </div>
</div>

<script>
    const ITEMS = [
        { name: 'Fixer', icon: '💉', effect: 'heal' },
        { name: 'Restraint', icon: '⛓️', effect: 'skip' },
        { name: 'Lens', icon: '🔍', effect: 'inspect' },
        { name: 'Chaos', icon: '🎲', effect: 'shuffle' }
    ];

    let state = {
        turn: 0,
        chamber: [],
        chamberIdx: 0,
        currentRound: 1,
        canShoot: true,
        isSkipped: false,
        players: [
            { name: "P1", lives: 4, inv: [], port: "👤", portIdx: 0 },
            { name: "P2", lives: 4, inv: [], port: "👤", portIdx: 0 }
        ]
    };

    const portraits = ["👤", "💀", "👺", "🤡", "🤖", "👽"];

    function cyclePortLobby(p) {
        state.players[p].portIdx = (state.players[p].portIdx + 1) % portraits.length;
        state.players[p].port = portraits[state.players[p].portIdx];
        document.getElementById(`p${p}-portrait-display`).innerText = state.players[p].port;
    }

    function startGame() {
        for(let i=0; i<2; i++) {
            state.players[i].name = document.getElementById(`p${i}-name-in`).value.toUpperCase();
            document.getElementById(`p${i}-name-tag`).innerText = state.players[i].name;
            document.getElementById(`p${i}-portrait`).innerText = state.players[i].port;
        }
        document.getElementById('main-menu').style.display = 'none';
        initChamber();
        drawShadows();
    }

    function initChamber() {
        let pool = ['LIVE', 'LIVE', 'BLANK', 'BLANK', 'BLANK', 'FIRE'];
        state.chamber = pool.sort(() => Math.random() - 0.5);
        state.chamberIdx = 0;
        updateUI();
    }

    function updateGunAim(mouseX, mouseY) {
        const gun = document.getElementById('gun-emoji');
        const container = document.getElementById('gun-system');
        const rect = container.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;

        const angle = Math.atan2(mouseY - centerY, mouseX - centerX);
        let deg = angle * (180 / Math.PI);

        // FLIP LOGIC: If aiming left, flip Y and adjust rotation so it doesn't roll upside down
        let flip = '';
        if (mouseX < centerX) {
            flip = 'scaleY(-1)';
        } else {
            flip = 'scaleY(1)';
        }
        
        gun.style.transform = `rotate(${deg}deg) ${flip}`;
    }

    window.addEventListener('mousemove', (e) => updateGunAim(e.clientX, e.clientY));

    function handleShoot(targetIdx) {
        if (!state.canShoot) return;
        state.canShoot = false;

        const bullet = state.chamber[state.chamberIdx];
        const gun = document.getElementById('gun-emoji');
        const light = document.getElementById('light-bulb');
        
        // 1. Shake before firing
        gun.classList.add('shaking-heavy');
        
        // 2. Flash light color
        const flashColor = bullet === 'LIVE' ? '#ff3333' : (bullet === 'FIRE' ? '#ffaa00' : '#33aaff');
        
        setTimeout(() => {
            light.style.backgroundColor = flashColor;
            light.style.boxShadow = `0 0 80px 30px ${flashColor}`;
            
            // 3. Recoil & Sound
            gun.classList.remove('shaking-heavy');
            gun.classList.add('recoil-anim');
            playTone(bullet);

            setTimeout(() => {
                light.style.backgroundColor = '#ffe';
                light.style.boxShadow = '0 0 60px 10px rgba(255, 255, 255, 0.1)';
                gun.classList.remove('recoil-anim');
                resolveShot(bullet, targetIdx);
            }, 200);
        }, 500);
    }

    function resolveShot(type, targetIdx) {
        let dmg = (type === 'LIVE') ? 1 : (type === 'FIRE' ? 2 : 0);
        
        if (dmg > 0) {
            animateLifeLoss(targetIdx, dmg);
        } else {
            showToast("MISS", 1000);
        }

        state.chamberIdx++;
        
        setTimeout(() => {
            if (state.players[0].lives <= 0 || state.players[1].lives <= 0) {
                endMatch();
            } else if (state.chamberIdx >= 6) {
                showStatsTransition();
            } else {
                state.turn = 1 - state.turn;
                if (state.isSkipped) {
                    state.isSkipped = false;
                    state.turn = 1 - state.turn;
                    showToast("SKIPPED", 1500);
                }
                state.canShoot = true;
                updateUI();
            }
        }, 1000);
    }

    function animateLifeLoss(pIdx, amount) {
        const container = document.getElementById(`p${pIdx}-lives`);
        for (let i = 0; i < amount; i++) {
            setTimeout(() => {
                const hearts = container.getElementsByClassName('heart');
                if (hearts.length > 0) {
                    hearts[hearts.length - 1].classList.add('heart-pop');
                    state.players[pIdx].lives--;
                }
            }, i * 300);
        }
    }

    function showStatsTransition() {
        const overlay = document.getElementById('stats-overlay');
        const timerText = document.getElementById('stats-timer');
        
        document.getElementById('stats-round-title').innerText = `ROUND ${state.currentRound} COMPLETE`;
        document.getElementById('stats-p0-report').innerText = `${state.players[0].name}: ${state.players[0].lives} LIVES`;
        document.getElementById('stats-p1-report').innerText = `${state.players[1].name}: ${state.players[1].lives} LIVES`;

        overlay.classList.add('active');

        let count = 6;
        const interval = setInterval(() => {
            count--;
            timerText.innerText = `Next round in ${count}s...`;
            if (count <= 0) {
                clearInterval(interval);
                overlay.classList.remove('active');
                state.currentRound++;
                awardItems();
                initChamber();
                state.canShoot = true;
            }
        }, 1000);
    }

    function awardItems() {
        state.players.forEach(p => {
            if (p.inv.length < 3) p.inv.push(ITEMS[Math.floor(Math.random() * ITEMS.length)]);
        });
    }

    function updateUI() {
        state.players.forEach((p, i) => {
            const liveDiv = document.getElementById(`p${i}-lives`);
            liveDiv.innerHTML = '';
            for(let l=0; l<p.lives; l++) {
                const s = document.createElement('span');
                s.className = 'heart';
                s.innerText = '❤';
                liveDiv.appendChild(s);
            }
            
            document.getElementById(`p${i}-card`).className = `player-card ${state.turn === i ? 'active' : ''}`;
            
            const slots = document.querySelectorAll(`#p${i}-inv .inv-slot`);
            slots.forEach((s, idx) => {
                s.innerText = p.inv[idx] ? p.inv[idx].icon : '';
            });
        });

        document.getElementById('match-info').innerText = `SEC_0${state.currentRound} // CHM_0${6 - state.chamberIdx}`;
        document.getElementById('gun-system').style.left = (state.turn === 0) ? "42%" : "58%";
    }

    function playTone(type) {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        osc.type = (type === 'BLANK') ? 'sine' : 'sawtooth';
        osc.frequency.setValueAtTime(type === 'BLANK' ? 200 : 100, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.2);
        g.gain.setValueAtTime(0.1, ctx.currentTime);
        g.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.2);
        osc.start(); osc.stop(ctx.currentTime + 0.2);
    }

    function showToast(msg, dur) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.style.opacity = 1;
        setTimeout(() => t.style.opacity = 0, dur);
    }

    function endMatch() {
        alert("CRITICAL SYSTEM FAILURE: DUEL ENDED");
        location.reload();
    }

    const canvas = document.getElementById('lighting-overlay');
    const ctx = canvas.getContext('2d');
    function drawShadows() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        ctx.clearRect(0,0,canvas.width, canvas.height);
        
        const pendulum = document.getElementById('pendulum-container').getBoundingClientRect();
        const lx = pendulum.left;
        const ly = pendulum.top + 250;

        document.querySelectorAll('.player-card').forEach(card => {
            const r = card.getBoundingClientRect();
            ctx.fillStyle = "rgba(0,0,0,0.8)";
            const corners = [{x:r.left,y:r.top},{x:r.right,y:r.top},{x:r.right,y:r.bottom},{x:r.left,y:r.bottom}];
            corners.forEach((c, i) => {
                const n = corners[(i+1)%4];
                ctx.beginPath();
                ctx.moveTo(c.x, c.y); ctx.lineTo(n.x, n.y);
                ctx.lineTo(n.x+(n.x-lx)*10, n.y+(n.y-ly)*10);
                ctx.lineTo(c.x+(c.x-lx)*10, c.y+(c.y-ly)*10);
                ctx.fill();
            });
        });
        requestAnimationFrame(drawShadows);
    }
</script>
</body>
</html>
